// ── Step 4: AI concepts ───────────────────────────────────────
function buildWizStep4(){
  if(_wiz.concepts.length === 0){
    // Trigger AI generation
    setTimeout(wizGenerateConcepts, 100);
    return `
      <div class="wiz-thinking">
        <div class="wiz-thinking-icon">✦</div>
        <div style="font-size:16px;font-weight:500;margin-bottom:8px">Thinking about your trip…</div>
        <div class="wiz-thinking-text">Generating itinerary ideas based on your preferences</div>
      </div>`;
  }

  return `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 4 of 7</div>
      <div class="wiz-title">Pick an itinerary concept</div>
      <div class="wiz-sub">These are shaped around your preferences. Pick one to build from, or ask for more ideas.</div>
    </div>

    <div id="wiz-concepts-list">
      ${_wiz.concepts.map((c,i) => `
        <div class="wiz-concept ${_wiz.selectedConcept===i?'selected':''}" onclick="wizSelectConcept(${i})">
          <div class="wiz-concept-title">${esc(c.title)}</div>
          <div class="wiz-concept-desc">${esc(c.description)}</div>
          <div class="wiz-concept-tags">
            ${c.duration?`<span class="wiz-concept-tag">⏱ ${esc(c.duration)}</span>`:''}
            ${c.pace?`<span class="wiz-concept-tag">🚶 ${esc(c.pace)}</span>`:''}
            ${c.budget?`<span class="wiz-concept-tag">💰 ${esc(c.budget)}</span>`:''}
            ${c.bestFor?`<span class="wiz-concept-tag">✓ ${esc(c.bestFor)}</span>`:''}
          </div>
        </div>`).join('')}
    </div>

    <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="wizMoreConcepts()">↻ Show different ideas</button>

    <div class="wiz-nav">
      <button class="btn btn-ghost" onclick="wizBack()">← Back</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="wizNext(4)">Build this trip →</button>
    </div>`;
}

function wizSelectConcept(i){
  _wiz.selectedConcept = i;
  document.querySelectorAll('.wiz-concept').forEach((el,idx) => el.classList.toggle('selected', idx===i));
}

async function wizMoreConcepts(){
  _wiz.concepts = [];
  _wiz.selectedConcept = null;
  renderWizStep();
}

async function wizGenerateConcepts(){
  const styleStr = _wiz.styles.join(', ') || 'general interest';
  const destStr = _wiz.destinationKnown && _wiz.destination ? _wiz.destination : 'open — suggest something';
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1500,
        system:`Return ONLY a valid JSON array of 4 distinct trip itinerary concepts. No markdown, no explanation.
Each concept: {"title":"short evocative name","description":"2-3 sentences — specific cities/regions, what makes this routing special, what kind of experience it delivers","segments":["City1","City2","City3"],"duration":"e.g. 12 days","pace":"slow|moderate|fast","budget":"budget|mid-range|comfortable|luxury","bestFor":"1 short phrase e.g. first-timers, nature lovers, foodies","seasonNote":"brief note on why this season works or a caveat"}
Be specific — name real places. Make each concept genuinely different from the others in routing, experience, or character. Do not return generic or similar options.`,
        messages:[{role:'user', content:`Plan a ${_wiz.duration||'2 week'} trip in ${_wiz.travelMonth||'any season'} for ${_wiz.travellers||'2'} traveller(s).
Destination: ${destStr}.
Interests: ${styleStr}.
Pace preference: ${_wiz.pace||'moderate'}.
Budget level: ${_wiz.budget||'mid-range'}.
Home currency: ${_wiz.homeCurrency}.
Return 4 distinct trip concepts as a JSON array.`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    _wiz.concepts = JSON.parse(text);
    renderWizStep();
  } catch(e){
    document.getElementById('wizard-inner').innerHTML = buildWizProgress() + `
      <div class="wiz-error">Could not generate suggestions — check your connection and try again.</div>
      <div class="wiz-nav">
        <button class="btn btn-ghost" onclick="wizBack()">← Back</button>
        <button class="btn btn-primary" onclick="_wiz.concepts=[];renderWizStep()">Try again</button>
      </div>`;
  }
}

// ── Step 5: Segment preview ───────────────────────────────────
function buildWizStep5(){
  if(_wiz.segments.length === 0){
    setTimeout(wizBuildSegments, 100);
    return `
      <div class="wiz-thinking">
        <div class="wiz-thinking-icon">🗺</div>
        <div style="font-size:16px;font-weight:500;margin-bottom:8px">Building your itinerary…</div>
        <div class="wiz-thinking-text">Working out the routing and night counts</div>
      </div>`;
  }
  const concept = _wiz.concepts[_wiz.selectedConcept];
  return `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 5 of 7</div>
      <div class="wiz-title">Your itinerary</div>
      <div class="wiz-sub">Adjust the nights in each place before we build your trip. You can change everything later.</div>
    </div>

    ${concept?.seasonNote ? `<div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--amber);margin-bottom:16px">📅 ${esc(concept.seasonNote)}</div>` : ''}

    <div class="wiz-section">
      <div class="wiz-section-label">Trip start date <span style="color:var(--text3);font-weight:400">(optional — you can set this later)</span></div>
      <input type="date" id="wiz-start-date" value="${_wiz.startDate}" onchange="_wiz.startDate=this.value;rerenderWizSegDates()">
    </div>

    <div class="wiz-section">
      <div class="wiz-section-label">Segments — tap nights to adjust</div>
      <div class="wiz-seg-preview" id="wiz-seg-preview">
        ${renderWizSegPreview()}
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:8px">Total: <strong id="wiz-total-nights">${_wiz.segments.reduce((a,s)=>a+s.nights,0)} nights</strong></div>
    </div>

    <div class="wiz-nav">
      <button class="btn btn-ghost" onclick="wizBack()">← Back</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="wizNext(5)">Continue →</button>
    </div>`;
}

function renderWizSegPreview(){
  return _wiz.segments.map((seg,i) => {
    const color = SEG_COLORS_ARR[i % SEG_COLORS_ARR.length];
    const dateStr = seg.startDate ? ` · ${fmtDate(seg.startDate)}` : '';
    return `<div class="wiz-seg-row">
      <div class="wiz-seg-bar" style="background:${color}"></div>
      <div style="flex:1">
        <div class="wiz-seg-city">${esc(seg.city)}</div>
        <div class="wiz-seg-nights">${dateStr}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="wizAdjustNights(${i},-1)" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;width:26px;height:26px;font-size:16px;cursor:pointer;line-height:1">−</button>
        <span class="wiz-seg-nights" style="min-width:50px;text-align:center" id="wiz-nights-${i}">${seg.nights} night${seg.nights!==1?'s':''}</span>
        <button onclick="wizAdjustNights(${i},1)" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;width:26px;height:26px;font-size:16px;cursor:pointer;line-height:1">+</button>
      </div>
    </div>`;
  }).join('');
}

function wizAdjustNights(idx, delta){
  const seg = _wiz.segments[idx];
  seg.nights = Math.max(1, (seg.nights||1) + delta);
  // Recalculate dates
  wizRecalcDates();
  document.getElementById('wiz-seg-preview').innerHTML = renderWizSegPreview();
  const total = _wiz.segments.reduce((a,s)=>a+s.nights,0);
  const el = document.getElementById('wiz-total-nights');
  if(el) el.textContent = total + ' nights';
}

function wizRecalcDates(){
  if(!_wiz.startDate) return;
  let cur = new Date(_wiz.startDate + ' 00:00');
  _wiz.segments.forEach(seg => {
    seg.startDate = cur.toISOString().split('T')[0];
    const end = new Date(cur);
    end.setDate(end.getDate() + seg.nights);
    seg.endDate = end.toISOString().split('T')[0];
    cur = end;
  });
}

function rerenderWizSegDates(){
  wizRecalcDates();
  document.getElementById('wiz-seg-preview').innerHTML = renderWizSegPreview();
}

async function wizBuildSegments(){
  const concept = _wiz.concepts[_wiz.selectedConcept];
  if(!concept){ wizBack(); return; }
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:800,
        system:`Return ONLY a valid JSON array of trip segments. No markdown, no explanation.
Each segment: {"city":"city name","country":"country","nights":N,"notes":"1 sentence on what to do here","transitFrom":"previous city or null"}
Allocate nights logically — more nights in places with more to see. Total should match the requested duration. Include transit/connection cities if needed (1 night each).`,
        messages:[{role:'user', content:`Build the detailed segment breakdown for this trip concept:
Title: ${concept.title}
Description: ${concept.description}
Cities/regions mentioned: ${(concept.segments||[]).join(', ')}
Duration: ${_wiz.duration||concept.duration||'2 weeks'}
Travel month: ${_wiz.travelMonth}
Pace: ${_wiz.pace||concept.pace||'moderate'}
Return a JSON array of segments with night counts.`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const segs = JSON.parse(text);
    _wiz.segments = segs.map(s => ({
      city: s.city||'',
      country: s.country||'',
      nights: Math.max(1, parseInt(s.nights)||3),
      notes: s.notes||'',
      transitFrom: s.transitFrom||null,
      startDate:'',
      endDate:''
    }));
    wizRecalcDates();
    renderWizStep();
  } catch(e){
    document.getElementById('wizard-inner').innerHTML = buildWizProgress() + `
      <div class="wiz-error">Could not build segments — try again.</div>
      <div class="wiz-nav">
        <button class="btn btn-ghost" onclick="wizBack()">← Back</button>
        <button class="btn btn-primary" onclick="_wiz.segments=[];renderWizStep()">Try again</button>
      </div>`;
  }
}

// ── Step 6: Seed places ────────────────────────────────────────
function buildWizStep6(){
  if(Object.keys(_wiz.seedPlaces).length === 0){
    setTimeout(wizGenerateSeedPlaces, 100);
    return `
      <div class="wiz-thinking">
        <div class="wiz-thinking-icon">📍</div>
        <div style="font-size:16px;font-weight:500;margin-bottom:8px">Finding places for your trip…</div>
        <div class="wiz-thinking-text">Generating starter suggestions for each destination</div>
      </div>`;
  }

  return `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 6 of 7</div>
      <div class="wiz-title">Starter places</div>
      <div class="wiz-sub">A few suggestions for each stop. Select the ones you want added to your places list — you can always add more later.</div>
    </div>

    ${_wiz.segments.map((seg,si) => {
      const places = _wiz.seedPlaces[seg.city] || [];
      if(!places.length) return '';
      return `<div class="wiz-section">
        <div class="wiz-section-label">${esc(seg.city)}</div>
        ${places.map((p,pi) => {
          const key = seg.city + '__' + pi;
          const sel = _wiz.seedSelected[key] !== false;
          return `<div class="wiz-card ${sel?'selected':''}" onclick="wizToggleSeedPlace('${key}',this)" style="padding:12px 14px;margin-bottom:6px">
            <div class="wiz-card-title">${placeTypeEmoji(p.type)} ${esc(p.name)}</div>
            <div class="wiz-card-sub">${esc(p.description||p.notes||'')}</div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}

    <div class="wiz-nav">
      <button class="btn btn-ghost" onclick="wizBack()">← Back</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost btn-sm" onclick="wizSkipSeed()">Skip</button>
      <button class="btn btn-primary" onclick="wizNext(6)">Continue →</button>
    </div>`;
}

function wizToggleSeedPlace(key, el){
  _wiz.seedSelected[key] = _wiz.seedSelected[key] === false ? true : false;
  el.classList.toggle('selected', _wiz.seedSelected[key] !== false);
}

function wizSkipSeed(){
  _wiz.seedSelected = {};
  _wiz.step = 7;
  renderWizStep();
}

async function wizGenerateSeedPlaces(){
  // Generate 3 seed places per segment simultaneously
  const segs = _wiz.segments.slice(0,6); // cap at 6 to avoid too many requests
  const styleHint = _wiz.styles.join(', ') || 'general interest';

  try{
    // Single call for all cities to be efficient
    const cityList = segs.map(s=>s.city).join(', ');
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:2000,
        system:`Return ONLY a valid JSON object. No markdown. Keys are city names, values are arrays of 3-4 place suggestions.
Each place: {"name":"place name","type":"eat|do|see|hike","description":"one specific sentence","cost":"free|$|$$|$$$"}
Be specific — real place names, not generic descriptions. Vary types across eat/do/see/hike.`,
        messages:[{role:'user', content:`Suggest starter places for a traveller interested in: ${styleHint}. Budget: ${_wiz.budget||'mid-range'}. Cities: ${cityList}. Return JSON object keyed by city name.`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    _wiz.seedPlaces = JSON.parse(text);
    // Default all to selected
    _wiz.seedSelected = {};
    segs.forEach(seg => {
      const places = _wiz.seedPlaces[seg.city]||[];
      places.forEach((_,pi) => { _wiz.seedSelected[seg.city+'__'+pi] = true; });
    });
    renderWizStep();
  } catch(e){
    // Skip seed places on error
    _wiz.seedPlaces = {_error:true};
    _wiz.step = 7;
    renderWizStep();
  }
}

// ── Step 7: Confirm ───────────────────────────────────────────
function buildWizStep7(){
  const concept = _wiz.concepts[_wiz.selectedConcept];
  const totalNights = _wiz.segments.reduce((a,s)=>a+s.nights,0);
  const selectedSeeds = Object.entries(_wiz.seedSelected).filter(([k,v])=>v!==false).length;
  return `
    <div class="wiz-header">
      <div class="wiz-step-label">Step 7 of 7</div>
      <div class="wiz-title">Ready to build your trip</div>
      <div class="wiz-sub">Here's what we'll create. You can change everything once the trip is set up.</div>
    </div>

    <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px">
      <div style="font-weight:500;font-size:16px;margin-bottom:4px">${esc(concept?.title||'Your trip')}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:14px">${esc(concept?.description||'')}</div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text3)">
        <span>📍 ${_wiz.segments.length} destinations</span>
        <span>🌙 ${totalNights} nights</span>
        ${_wiz.travelMonth?`<span>📅 ${_wiz.travelMonth}</span>`:''}
        ${selectedSeeds?`<span>🗺 ${selectedSeeds} starter places</span>`:''}
      </div>
    </div>

    <div class="wiz-section">
      <div class="wiz-section-label">Trip name</div>
      <input type="text" id="wiz-trip-name" value="${esc(concept?.title || (_wiz.destination ? _wiz.destination + ' ' + (_wiz.travelMonth||'Trip') : 'My Trip'))}" style="font-size:15px">
    </div>

    <div class="wiz-nav">
      <button class="btn btn-ghost" onclick="wizBack()">← Back</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="wizCreateTrip()">✦ Create trip</button>
    </div>`;
}

// ── Create the trip ───────────────────────────────────────────
function wizCreateTrip(){
  const name = document.getElementById('wiz-trip-name')?.value.trim() || 'My Trip';
  const trip = emptyTrip(name, _wiz.segments[0]?.startDate||'', _wiz.segments[_wiz.segments.length-1]?.endDate||'', _wiz.homeCurrency);

  // Build segments
  _wiz.segments.forEach((wizSeg, i) => {
    const seg = emptySegment(wizSeg.city, wizSeg.city, wizSeg.startDate||'', wizSeg.endDate||'', i % 8);
    if(wizSeg.notes) seg.notes = wizSeg.notes;

    // Add selected seed places
    const places = _wiz.seedPlaces[wizSeg.city] || [];
    places.forEach((p, pi) => {
      const key = wizSeg.city + '__' + pi;
      if(_wiz.seedSelected[key] !== false){
        const place = emptyPlace();
        place.name = p.name || '';
        place.type = p.type || 'other';
        place.notes = p.description || '';
        seg.places.push(place);
      }
    });

    trip.segments.push(seg);
  });

  state.trip = trip;
  persist();
  closeWizard();
  renderAll();
  showView('overview');
  toast('Trip created — ' + trip.segments.length + ' segments ready to plan ✓');
}

// ── Wizard navigation helpers ─────────────────────────────────
function wizToggleSingle(field, val){
  _wiz[field] = _wiz[field] === val ? '' : val;
  // Re-render chips only (lightweight)
  renderWizStep();
}

function wizToggleMulti(field, val){
  const arr = _wiz[field];
  const idx = arr.indexOf(val);
  if(idx >= 0) arr.splice(idx,1); else arr.push(val);
  renderWizStep();
}

function wizNext(fromStep){
  // Validation
  if(fromStep===3 && _wiz.destinationKnown===null){ toast('Please choose a destination option'); return; }
  if(fromStep===4 && _wiz.selectedConcept===null){ toast('Please select an itinerary concept'); return; }

  // Reset downstream data when going forward past concept selection
  if(fromStep===3){ _wiz.concepts=[]; _wiz.selectedConcept=null; _wiz.segments=[]; _wiz.seedPlaces={}; }
  if(fromStep===4){ _wiz.segments=[]; _wiz.seedPlaces={}; }
  if(fromStep===5){ _wiz.seedPlaces={}; }

  _wiz.step = fromStep + 1;
  renderWizStep();
}

function wizBack(){
  if(_wiz.step <= 1){ closeWizard(); return; }
  _wiz.step--;
  // Clear data that needs to be regenerated
  if(_wiz.step===4){ _wiz.segments=[]; _wiz.seedPlaces={}; }
  renderWizStep();
}


// ============================================================
// JOURNAL VIEW
// ============================================================
function renderJournalView(){
  const t = state.trip;
  const el = document.getElementById('view-journal');
  if(!t){
    el.innerHTML = '<div class="empty"><div class="empty-text">No trip loaded — create or open a trip to start journalling</div></div>';
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  // Sort segments by start date for chronological journal
  const segs = [...(t.segments||[])].sort((a,b) => (a.startDate||'') < (b.startDate||'') ? -1 : 1);

  // Check if any part of the trip has passed
  const anyPast = segs.some(s => s.endDate && new Date(s.endDate+' 00:00') < today);
  const tripFullyPast = t.endDate && new Date(t.endDate+' 00:00') < today;

  el.innerHTML = `
    <div class="section-title">Journal</div>
    <div class="section-sub">${esc(t.name)}</div>

    <!-- Planning notes (pre-trip) -->
    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <div class="card-title">Planning notes</div>
        <span style="font-size:11px;color:var(--text3)">Pre-trip</span>
      </div>
      <textarea
        placeholder="What are you hoping for from this trip? Intentions, excitement, things you want to make sure happen…"
        style="min-height:120px"
        onchange="saveTripNotes(this.value)"
      >${esc(t.notes||'')}</textarea>
    </div>

    <!-- Culture guide quick-ref if present -->
    ${t.cultureGuide ? `
    <div class="card">
      <div class="card-header">
        <div class="card-title">Culture &amp; language</div>
        <button class="btn btn-ghost btn-sm" onclick="showView('overview')">Edit on overview</button>
      </div>
      <div style="font-size:13px;color:var(--text2);white-space:pre-line;line-height:1.7">${esc(t.cultureGuide)}</div>
    </div>` : ''}

    <!-- Reflections section -->
    <div style="margin-top:8px;margin-bottom:12px;display:flex;align-items:center;gap:12px">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em">Reflections</div>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    ${!anyPast ? `
    <div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;font-style:italic">
      Reflection fields will appear here once your trip has started. Come back during or after your travels.
    </div>` : ''}

    <!-- Trip-level overall reflection (only after trip has some past segments) -->
    ${anyPast ? `
    <div class="card" style="border-color:var(--green-border,#86c98f)">
      <div class="card-header">
        <div class="card-title">Overall reflection</div>
        <span style="font-size:11px;color:var(--text3)">${tripFullyPast ? 'Post-trip' : 'In progress'}</span>
      </div>
      <textarea
        placeholder="How has the trip been overall? What stands out? What would you tell someone planning the same trip?"
        style="min-height:160px"
        onchange="saveTripReflection(this.value)"
      >${esc(t.reflection||'')}</textarea>
    </div>` : ''}

    <!-- Per-segment reflections -->
    ${segs.map(seg => {
      const segEnd = seg.endDate ? new Date(seg.endDate+' 00:00') : null;
      const isPast = segEnd && segEnd < today;
      const isToday = segEnd && segEnd.getTime() === today.getTime();
      if(!isPast && !isToday) return ''; // future segments hidden

      const nights = calcNights(seg.startDate, seg.endDate);
      const dateStr = seg.startDate ? fmtDate(seg.startDate) + (seg.endDate ? ' → ' + fmtDate(seg.endDate) : '') : '';

      return `
      <div class="card" style="border-left:3px solid ${['#b87d0a','#1a5fa8','#2d7a3a','#b52b2b','#7b4f9e','#c47a00','#0f6e6e','#c44080'][seg.color%8]}">
        <div class="card-header" style="margin-bottom:8px">
          <div>
            <div class="card-title">${esc(seg.city||seg.name)}</div>
            <div style="font-size:12px;color:var(--text3)">${dateStr}${nights ? ' · '+nights+' nights' : ''}</div>
          </div>
        </div>

        ${seg.notes ? `<div style="font-size:12px;color:var(--text2);background:var(--surface2);border-radius:var(--radius);padding:8px 10px;margin-bottom:10px;line-height:1.5;font-style:italic">"${esc(seg.notes)}"</div>` : ''}

        ${seg.weatherSummary ? `<div style="font-size:12px;color:var(--text3);margin-bottom:10px;white-space:pre-line">${esc(seg.weatherSummary)}</div>` : ''}

        <textarea
          placeholder="How was ${esc(seg.city||seg.name)}? What did you actually end up doing? Anything unexpected? What would you do differently?"
          style="min-height:120px"
          onchange="saveSegmentReflection('${seg.id}',this.value)"
        >${esc(seg.reflection||'')}</textarea>
      </div>`;
    }).join('')}
  `;
}

function saveTripReflection(val){
  if(!state.trip) return;
  state.trip.reflection = val;
  persist();
}

// ============================================================
// TRIP PICKER
// ============================================================
function showTripPicker(){
  document.getElementById('trip-picker-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderTripPicker();
}

function closeTripPicker(){
  document.getElementById('trip-picker-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function renderTripPicker(){
  const trips = getAllTrips();
  const activeId = state.trip?.id;
  const el = document.getElementById('trip-picker-inner');
  const fmt = d => d ? new Date(d).toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'}) : '';

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <h2 style="font-size:20px;font-weight:400">My trips</h2>
      <button onclick="closeTripPicker()" style="background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:0;line-height:1">✕</button>
    </div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:20px">Trips saved on this device</div>

    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn btn-primary btn-sm" onclick="closeTripPicker();setTimeout(showNewTripModal,80)">+ New trip</button>
      <button class="btn btn-ghost btn-sm" onclick="closeTripPicker();setTimeout(loadTrip,80)">⬆ Load from file</button>
    </div>

    ${trips.length === 0
      ? `<div style="text-align:center;padding:40px 20px;color:var(--text3)">No trips yet — create one to get started.</div>`
      : trips.slice().sort((a,b) => (b._lastModified||0)-(a._lastModified||0)).map(trip => {
          const isActive = trip.id === activeId;
          const nights = (() => {
            const dates = (trip.segments||[]).flatMap(s=>[s.startDate,s.endDate].filter(Boolean));
            if(!dates.length) return 0;
            const earliest = dates.reduce((a,b)=>a<b?a:b);
            const latest = dates.reduce((a,b)=>a>b?a:b);
            const diff = (new Date(latest+' 00:00')-new Date(earliest+' 00:00'))/(1000*60*60*24);
            return Math.max(0,Math.round(diff));
          })();
          const cities = [...new Set((trip.segments||[]).map(s=>s.city||s.name).filter(Boolean))].slice(0,4).join(', ');
          const modified = trip._lastModified ? fmt(trip._lastModified) : '';

          return `<div style="background:var(--surface);border:1.5px solid ${isActive?'var(--text)':'var(--border)'};border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;position:relative">
            ${isActive ? '<div style="position:absolute;top:12px;right:14px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Active</div>' : ''}
            <div style="font-weight:500;font-size:15px;margin-bottom:4px;padding-right:60px">${esc(trip.name||'Untitled')}</div>
            ${cities ? `<div style="font-size:12px;color:var(--text2);margin-bottom:4px">📍 ${esc(cities)}${(trip.segments||[]).length > 4 ? ' +' + ((trip.segments||[]).length - 4) + ' more' : ''}</div>` : ''}
            <div style="display:flex;gap:12px;font-size:12px;color:var(--text3);flex-wrap:wrap;margin-bottom:12px">
              ${trip.startDate ? `<span>${fmt(trip.startDate)} → ${fmt(trip.endDate||trip.startDate)}</span>` : ''}
              ${nights ? `<span>${nights} nights</span>` : ''}
              ${(trip.segments||[]).length ? `<span>${trip.segments.length} segments</span>` : ''}
              ${modified ? `<span>Edited ${modified}</span>` : ''}
            </div>
            <div style="display:flex;gap:8px">
              ${!isActive ? `<button class="btn btn-primary btn-sm" onclick="switchToTrip(${trip.id})">Open</button>` : `<button class="btn btn-ghost btn-sm" onclick="closeTripPicker()">Continue</button>`}
              <button class="btn btn-ghost btn-sm" onclick="exportTripById(${trip.id})">⬇ Save</button>
              <button class="btn btn-danger btn-sm" onclick="confirmDeleteTripById(${trip.id},'${esc(trip.name||'Untitled').replace(/'/g,'&#39;')}')">Delete</button>
            </div>
          </div>`;
        }).join('')
    }

    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);line-height:1.7">
      Trips are stored on this device. To use across devices, save each trip as a file and load it on the other device.
    </div>`;
}

function confirmDeleteTripById(tripId, tripName){
  if(confirm('Delete "' + tripName + '"? This cannot be undone.')) deleteTripById(tripId);
}

function exportTripById(tripId){
  const trips = getAllTrips();
  const trip = trips.find(t => t.id === tripId);
  if(!trip){ toast('Trip not found'); return; }
  const blob = new Blob([JSON.stringify({trip}, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (trip.name||'trip').replace(/[^a-z0-9]/gi,'_') + '.json';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  toast('Trip saved ✓');
}

// ============================================================
// UTILS
// ============================================================
function calcNights(startDate, endDate){
  if(!startDate || !endDate) return 0;
  const diff = (new Date(endDate + ' 00:00') - new Date(startDate + ' 00:00')) / (1000*60*60*24);
  return Math.max(0, Math.round(diff));
}

function calcTripNights(trip){
  // Count by actual date range (earliest seg start → latest seg end)
  // This correctly handles overlapping segment boundaries and transit days
  const dates = (trip.segments||[]).flatMap(s => [s.startDate, s.endDate].filter(Boolean));
  if(dates.length === 0){
    // Fallback: sum unique days across all segment day arrays
    const allDates = new Set();
    (trip.segments||[]).forEach(s => (s.days||[]).forEach(d => { if(d.date) allDates.add(d.date); }));
    return allDates.size;
  }
  const earliest = dates.reduce((a,b) => a < b ? a : b);
  const latest = dates.reduce((a,b) => a > b ? a : b);
  return calcNights(earliest, latest);
}
function esc(str){ 
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(dateStr){
  if(!dateStr) return '';
  try{
    return new Date(dateStr+' 00:00').toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'});
  } catch(e){ return dateStr; }
}

function toast(msg){
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2800);
}
