function saveOption(type, segId, existingOptId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  if(type === 'departure' && !seg.departure) seg.departure = { options: [], selectedIndex: 0 };
  const pool = type === 'travel' ? seg.travel : type === 'departure' ? seg.departure : seg.accommodation;
  const isTravel = type === 'travel' || type === 'departure';

  const data = {
    name: document.getElementById('m-opt-name').value.trim(),
    url: document.getElementById('m-opt-url').value.trim(),
    notes: document.getElementById('m-opt-notes').value.trim(),
    price: document.getElementById('m-opt-price').value.trim(),
    currency: document.getElementById('m-opt-currency').value,
    status: document.getElementById('m-opt-status').value,
    bookingRef: document.getElementById('m-opt-ref').value.trim(),
  };

  if(isTravel){
    data.mode = document.getElementById('m-opt-mode').value;
    data.departureTime = document.getElementById('m-opt-dep').value.trim();
    data.arrivalTime = document.getElementById('m-opt-arr').value.trim();
    data.duration = document.getElementById('m-opt-dur').value.trim();
    data.fromName = (document.getElementById('m-opt-from')||{value:''}).value.trim();
    data.fromLat = parseFloat((document.getElementById('m-opt-from-lat')||{value:''}).value)||null;
    data.fromLng = parseFloat((document.getElementById('m-opt-from-lng')||{value:''}).value)||null;
    data.toName = (document.getElementById('m-opt-to')||{value:''}).value.trim();
    data.toLat = parseFloat((document.getElementById('m-opt-to-lat')||{value:''}).value)||null;
    data.toLng = parseFloat((document.getElementById('m-opt-to-lng')||{value:''}).value)||null;
  } else {
    data.checkIn = document.getElementById('m-opt-checkin').value.trim();
    data.checkOut = document.getElementById('m-opt-checkout').value.trim();
    data.pricePerNight = document.getElementById('m-opt-perpnight') ? document.getElementById('m-opt-perpnight').checked : false;
  }

  if(existingOptId){
    const opt = pool.options.find(o => o.id == existingOptId);
    if(opt) Object.assign(opt, data);
  } else {
    const newOpt = emptyOption(type);
    Object.assign(newOpt, data);
    pool.options.push(newOpt);
    if(pool.options.length === 1) pool.selectedIndex = 0;
  }

  persist();
  closeModal();
  renderSegment(segId);
  renderBudgetBar();
  setTimeout(restoreSegTab, 10);
}

// ---- Extract tab switcher ----
function switchExtractTab(prefix, tab){
  const urlPanel = document.getElementById(`m-${prefix}-url-panel`);
  const textPanel = document.getElementById(`m-${prefix}-text-panel`);
  const urlBtn = document.getElementById(`m-${prefix}-tab-url`);
  const textBtn = document.getElementById(`m-${prefix}-tab-text`);
  if(!urlPanel) return;
  if(tab === 'url'){
    urlPanel.style.display = 'block';
    textPanel.style.display = 'none';
    urlBtn.style.background = 'var(--text)'; urlBtn.style.color = '#fff';
    textBtn.style.background = 'transparent'; textBtn.style.color = 'var(--text2)';
  } else {
    urlPanel.style.display = 'none';
    textPanel.style.display = 'block';
    textBtn.style.background = 'var(--text)'; textBtn.style.color = '#fff';
    urlBtn.style.background = 'transparent'; urlBtn.style.color = 'var(--text2)';
  }
}

// ---- Extract from pasted text (option modal) ----
async function extractFromText(type, segId, existingOptId){
  const pasteEl = document.getElementById('m-opt-paste');
  const text = pasteEl ? pasteEl.value.trim() : '';
  if(!text){ toast('Paste some text first'); return; }
  const statusEl = document.getElementById('extract-status');
  if(!aiAvailable()){
    statusEl.innerHTML = '<div class="url-extract-box"><div style="font-size:12px;color:var(--text2)">⚙ Configure an AI provider in ⚙ Settings to use extraction.</div></div>';
    return;
  }
  statusEl.innerHTML = '<div class="url-extract-box"><div class="url-extract-status"><div class="spinner"></div> Extracting details from text…</div></div>';

  const isTravel = type === 'travel' || type === 'departure';
  try{
    const raw = await aiCall(
      `Extract travel details from pasted text and return ONLY valid JSON, no markdown, no backticks.
Return: {"name":"property or service name","price":"numeric only","currency":"3-letter code","priceNote":"pricing context","checkIn":"check-in time","checkOut":"check-out time","mode":"flight/train/bus/ferry/car","departureTime":"departure time","arrivalTime":"arrival time","duration":"journey duration","distance":"distance if trail","difficulty":"difficulty if trail","elevationGain":"elevation gain","notes":"2-3 sentence summary"}
If you cannot determine a value, use null.`,
      'Extract travel details from this text:\n\n' + text,
      1000
    );
    let parsed;
    try{ parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e){ parsed = {error:'Could not parse response'}; }

    if(parsed.error){
      statusEl.innerHTML = '<div class="url-extract-box"><div style="font-size:12px;color:var(--text2)">⚠ Could not extract. Try selecting more detail from the page, or enter manually.</div></div>';
      return;
    }

    if(parsed.name && !document.getElementById('m-opt-name').value) document.getElementById('m-opt-name').value = parsed.name;
    if(parsed.price) document.getElementById('m-opt-price').value = parsed.price;
    if(parsed.currency){
      const sel = document.getElementById('m-opt-currency');
      if(sel) for(let i=0;i<sel.options.length;i++) if(sel.options[i].value===parsed.currency){ sel.selectedIndex=i; break; }
    }
    if(isTravel){
      if(parsed.mode && document.getElementById('m-opt-mode')){
        const sel = document.getElementById('m-opt-mode');
        for(let i=0;i<sel.options.length;i++) if(sel.options[i].value===parsed.mode){ sel.selectedIndex=i; break; }
      }
      if(parsed.departureTime && document.getElementById('m-opt-dep')) document.getElementById('m-opt-dep').value = parsed.departureTime;
      if(parsed.arrivalTime && document.getElementById('m-opt-arr')) document.getElementById('m-opt-arr').value = parsed.arrivalTime;
      if(parsed.duration && document.getElementById('m-opt-dur')) document.getElementById('m-opt-dur').value = parsed.duration;
    } else {
      if(parsed.checkIn && document.getElementById('m-opt-checkin')) document.getElementById('m-opt-checkin').value = parsed.checkIn;
      if(parsed.checkOut && document.getElementById('m-opt-checkout')) document.getElementById('m-opt-checkout').value = parsed.checkOut;
    }
    const noteParts = [parsed.notes, parsed.priceNote, parsed.distance, parsed.difficulty, parsed.elevationGain].filter(Boolean);
    if(noteParts.length && !document.getElementById('m-opt-notes').value){
      document.getElementById('m-opt-notes').value = noteParts.join(' · ');
    }
    statusEl.innerHTML = '<div class="url-extract-box" style="background:var(--green-bg);border-color:var(--green-border)"><div style="font-size:12px;color:var(--green)">✓ Details extracted — review and adjust as needed</div></div>';
  } catch(e){
    statusEl.innerHTML = '<div class="url-extract-box"><div style="font-size:12px;color:var(--red)">Error contacting API. Please enter details manually.</div></div>';
  }
}

function switchExtractTab(prefix, tab){
  const urlPanel = document.getElementById('m-'+prefix+'-url-panel');
  const textPanel = document.getElementById('m-'+prefix+'-text-panel');
  const urlBtn = document.getElementById('m-'+prefix+'-tab-url');
  const textBtn = document.getElementById('m-'+prefix+'-tab-text');
  if(!urlPanel || !textPanel) return;
  if(tab === 'url'){
    urlPanel.style.display = 'block';
    textPanel.style.display = 'none';
    urlBtn.style.background = 'var(--text)'; urlBtn.style.color = '#fff';
    textBtn.style.background = 'transparent'; textBtn.style.color = 'var(--text2)';
  } else {

function gv(id){ const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function populatePlaceExtractFields(parsed){
  const setVal = (id, val) => { const el = document.getElementById(id); if(el && val) el.value = val; };
  const setSel = (id, val) => {
    if(!val) return;
    const sel = document.getElementById(id);
    if(!sel) return;
    for(let i=0;i<sel.options.length;i++) if(sel.options[i].value===val){ sel.selectedIndex=i; break; }
  };
  if(parsed.name && !document.getElementById('m-pl-name').value) setVal('m-pl-name', parsed.name);
  if(parsed.type){ setSel('m-pl-type', parsed.type); switchPlaceType(parsed.type); }
  setVal('m-pl-price', parsed.price);
  setSel('m-pl-currency', parsed.currency);
  if(parsed.notes && !document.getElementById('m-pl-notes').value) setVal('m-pl-notes', parsed.notes);
  // eat
  setVal('m-pl-cuisine', parsed.cuisine);
  setSel('m-pl-priceRange', parsed.priceRange);
  setSel('m-pl-reservationRequired', parsed.reservationRequired);
  // see
  setVal('m-pl-category', parsed.category);
  setVal('m-pl-hours', parsed.hours);
  // do
  setVal('m-pl-doCategory', parsed.doCategory);
  setVal('m-pl-duration', parsed.duration);
  setSel('m-pl-bookingRequired', parsed.bookingRequired);
  // hike
  setVal('m-pl-distance', parsed.distance);
  setVal('m-pl-estimatedTime', parsed.estimatedTime);
  setSel('m-pl-difficulty', parsed.difficulty);
  setVal('m-pl-elevationGain', parsed.elevationGain);
  setSel('m-pl-trailType', parsed.trailType);
}

function savePlace(segId, existingPlaceId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const data = {
    name: gv('m-pl-name'),
    type: gv('m-pl-type'),
    url: gv('m-pl-url'),
    price: gv('m-pl-price'),
    currency: gv('m-pl-currency'),
    status: gv('m-pl-status'),
    notes: gv('m-pl-notes'),
    // eat
    cuisine: gv('m-pl-cuisine'),
    priceRange: gv('m-pl-priceRange'),
    reservationRequired: gv('m-pl-reservationRequired'),
    // see
    category: gv('m-pl-category'),
    hours: gv('m-pl-hours'),
    // do
    doCategory: gv('m-pl-doCategory'),
    duration: gv('m-pl-duration'),
    bookingRequired: gv('m-pl-bookingRequired'),
    // hike
    distance: gv('m-pl-distance'),
    estimatedTime: gv('m-pl-estimatedTime'),
    difficulty: gv('m-pl-difficulty'),
    elevationGain: gv('m-pl-elevationGain'),
    trailType: gv('m-pl-trailType'),
  };
  if(!data.name){ toast('Enter a name'); return; }

  if(existingPlaceId){
    const place = seg.places.find(p => p.id == existingPlaceId);
    if(place) Object.assign(place, data);
  } else {
    const newPlace = emptyPlace();
    Object.assign(newPlace, data);
    if(!seg.places) seg.places = [];
    seg.places.push(newPlace);
  }
  persist();
  closeModal();
  renderSegment(segId);
  renderBudgetBar();
  setTimeout(restoreSegTab, 10);
}

function deletePlace(segId, placeId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  // Remove from all days
  (seg.days||[]).forEach(d => { if(d.placedItems) d.placedItems = d.placedItems.filter(id => id != placeId); });
  seg.places = seg.places.filter(p => p.id != placeId);
  persist();
  renderSegment(segId);
  renderBudgetBar();
  setTimeout(restoreSegTab, 10);
}

function exportMarkdown(){
  if(!state.trip){ toast('No trip to export'); return; }
  const t = state.trip;
  const {total, booked} = calcBudget();
  const fmt = n => n ? n.toLocaleString(undefined,{maximumFractionDigits:0}) : '0';
  let md = '';

  md += `# ${t.name}\n\n`;
  if(t.startDate) md += `**${fmtDate(t.startDate)} → ${fmtDate(t.endDate||t.startDate)}** · ${t.segments.length} segments · ${t.homeCurrency} ${fmt(total)} projected\n\n`;
  if(t.notes) md += `> ${t.notes.replace(/\n/g,'\n> ')}\n\n`;
  if(t.reflection) md += `**Overall reflection:** ${t.reflection}\n\n`;

  if(t.cultureGuide){
    md += `## Culture & language\n\n${t.cultureGuide}\n\n---\n\n`;
  }

  t.segments.forEach(seg => {
    const nights = calcNights(seg.startDate, seg.endDate);
    const trav = seg.travel?.options?.[seg.travel?.selectedIndex||0];
    const acc = seg.accommodation?.options?.[seg.accommodation?.selectedIndex||0];
    md += `## ${seg.city||seg.name}`;
    if(seg.startDate) md += ` · ${fmtDate(seg.startDate)}${seg.endDate?' → '+fmtDate(seg.endDate):''}`;
    if(nights) md += ` · ${nights} nights`;
    md += `\n\n`;

    if(trav) md += `**Travel in:** ${trav.name}${trav.mode?' ('+trav.mode+')':''}${trav.departureTime?' · Dep '+trav.departureTime:''}${trav.arrivalTime?' · Arr '+trav.arrivalTime:''}${trav.price?' · '+(trav.currency||t.homeCurrency)+' '+trav.price:''}${trav.bookingRef?' · Ref: '+trav.bookingRef:''}\n\n`;
    if(acc) md += `**Accommodation:** ${acc.name}${acc.checkIn?' · Check-in '+acc.checkIn:''}${acc.checkOut?' · Check-out '+acc.checkOut:''}${acc.price?' · '+(acc.currency||t.homeCurrency)+' '+acc.price:''}${acc.bookingRef?' · Ref: '+acc.bookingRef:''}\n\n`;
    if(seg.notes) md += `*${seg.notes}*\n\n`;
    if(seg.weatherSummary) md += `**Weather:** ${seg.weatherSummary}\n\n`;
    if(seg.thingsToKnow) md += `**Things to know:**\n${seg.thingsToKnow}\n\n`;

    // Days
    if(seg.days && seg.days.length){
      seg.days.forEach((day,i) => {
        const dow = day.date ? new Date(day.date+' 00:00').toLocaleDateString('en',{weekday:'long'}) : '';
        const placed = (day.placedItems||[]).map(pid=>{const p=seg.places.find(x=>x.id==pid);return p?`${placeTypeEmoji(p.type)} ${p.name}`:''}).filter(Boolean);
        md += `### Day ${i+1} — ${dow}${day.date?' '+fmtDate(day.date):''}\n`;
        if(placed.length) md += placed.map(p=>`- ${p}`).join('\n') + '\n';
        if(day.notes) md += `\n${day.notes}\n`;
        md += '\n';
      });
    }

    // Places
    if(seg.places && seg.places.length){
      md += `### Places list\n\n`;
      seg.places.forEach(p => {
        const detail = [p.cuisine, p.priceRange, p.difficulty, p.distance, p.estimatedTime].filter(Boolean).join(', ');
        md += `- **${p.name}** (${p.type}${detail?', '+detail:''})${p.price?' · '+(p.currency||t.homeCurrency)+' '+p.price:''}${p.notes?' — '+p.notes.substring(0,80):''}\n`;
      });
      md += '\n';
    }

    if(seg.reflection) md += `**Reflection:** ${seg.reflection}\n\n`;
    md += `---\n\n`;
  });

  // Budget
  md += `## Budget\n\n| Segment | Item | Cost | Status |\n|---|---|---|---|\n`;
  (t.segments||[]).forEach(seg => {
    const nights = calcNights(seg.startDate, seg.endDate);
    [{label:'Travel in',pool:seg.travel},{label:'Accommodation',pool:seg.accommodation},{label:'Departure',pool:seg.departure}].forEach(({label,pool}) => {
      const opt = pool?.options?.[pool?.selectedIndex||0];
      if(opt?.price) md += `| ${seg.city||seg.name} | ${label}: ${opt.name} | ${opt.currency||t.homeCurrency} ${opt.price} | ${opt.status} |\n`;
    });
    if(seg.dailyBudget && nights) md += `| ${seg.city||seg.name} | Daily spend ×${nights}n | ${t.homeCurrency} ${(parseFloat(seg.dailyBudget)*nights).toFixed(0)} | — |\n`;
  });
  md += `\n**Total projected: ${t.homeCurrency} ${fmt(total)}** · **Booked: ${t.homeCurrency} ${fmt(booked)}**\n\n`;

  // Packing
  if(t.packingList && t.packingList.length){
    md += `## Packing list\n\n`;
    ['Documents','Clothing','Toiletries','Electronics','Gear','Medication','Other'].forEach(cat => {
      const items = t.packingList.filter(i=>i.category===cat);
      if(!items.length) return;
      md += `**${cat}**\n${items.map(i=>`- [${i.packed?'x':' '}] ${i.text}`).join('\n')}\n\n`;
    });
  }

  const blob = new Blob([md], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (t.name||'trip').replace(/[^a-z0-9]/gi,'_') + '_itinerary.md';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  toast('Markdown exported ✓');
}
function downloadHTML(html, filename){
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (filename||'export').replace(/[^a-z0-9]/gi,'_') + '.html';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  toast('Exported ✓');
}

function saveTrip(){
  if(!state.trip){ toast('No trip to save'); return; }
  exportTripById(state.trip.id);

function loadTrip(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,.tripcraft';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const loaded = JSON.parse(ev.target.result);
        // Support both {trip:...} format and raw trip objects
        const trip = loaded.trip || (loaded.id ? loaded : null);
        if(!trip){ toast('Invalid trip file'); return; }
        trip._lastModified = Date.now();
        const trips = getAllTrips();
        const existingIdx = trips.findIndex(t => t.id === trip.id);
        if(existingIdx >= 0) trips[existingIdx] = trip;
        else trips.push(trip);
        saveAllTrips(trips);
        localStorage.setItem(ACTIVE_KEY, trip.id);
        state.trip = trip;
        renderAll();
        showView('overview');
        toast('Trip loaded ✓');
      } catch(err){
        toast('Could not read file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

    if(seg.days && seg.days.length) {
      html += `<div class="section"><div class="section-label">Day plans</div>`;
      seg.days.forEach((day,i) => {
        const dow = day.date ? new Date(day.date+' 00:00').toLocaleDateString('en',{weekday:'short'}) : '';
        const placed = (day.placedItems||[]).map(pid=>{const p=seg.places.find(x=>x.id==pid);return p?`<span class="pill">${placeTypeEmoji(p.type)} ${esc(p.name)}</span>`:''}).join('');
        html += `<div class="day-compact">
          <div class="day-compact-num">Day ${i+1}</div>
          <div class="day-compact-date">${dow} ${day.date?fmtDate(day.date):''}</div>
          <div class="day-compact-body">
            ${placed ? `<div class="day-compact-places">${placed}</div>` : ''}
            ${day.notes ? `<div class="day-compact-notes">${esc(day.notes)}</div>` : ''}
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    // Places list
    if(seg.places && seg.places.length) {
      html += `<div class="section"><div class="section-label">Places list</div><div class="places-grid">`;
      seg.places.forEach(place => {
        const detail = [place.cuisine, place.priceRange, place.difficulty, place.distance, place.estimatedTime, place.hours, place.category].filter(Boolean).join(' · ');
        html += `<div class="place-card">
          <div class="place-card-type">${placeTypeEmoji(place.type)} ${place.type}</div>
          <div class="place-card-name">${esc(place.name)}</div>
          ${detail ? `<div class="place-card-detail">${esc(detail)}</div>` : ''}
          ${place.notes ? `<div class="place-card-detail" style="margin-top:3px">${esc(place.notes.substring(0,90))}</div>` : ''}
          ${place.price ? `<div style="font-size:.75rem;font-weight:500;margin-top:4px">${place.currency||t.homeCurrency} ${place.price}</div>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    }

    // Departure
    if(dep && isLastSegment(seg.id)) html += `<div class="section"><div class="section-label">Departure</div><div class="opt-row"><div class="opt-name">${esc(dep.name||'Departure')}</div><div class="opt-meta">${[dep.mode, dep.departureTime?'Dep '+dep.departureTime:'', dep.arrivalTime?'Arr '+dep.arrivalTime:'', dep.price?(dep.currency||t.homeCurrency)+' '+dep.price:''].filter(Boolean).join(' · ')}</div>${dep.bookingRef?`<div class="opt-ref">Ref: ${esc(dep.bookingRef)}</div>`:''}</div></div>`;

    // Reflection
    if(seg.reflection) html += `<div class="section"><div class="section-label">Reflection</div><div class="reflection-box">${esc(seg.reflection)}</div></div>`;

    html += `</div>`;
  });

  // Budget table
  if(budgetRows) html += `<div class="section" style="margin-top:40px;page-break-before:always"><h2 style="font-family:var(--serif);margin-bottom:16px">Budget breakdown</h2>
    <table><thead><tr><th>Segment</th><th>Category</th><th>Item</th><th class="td-right">Cost</th><th>Status</th></tr></thead>
    <tbody>${budgetRows}</tbody>
    <tfoot><tr class="td-total"><td colspan="3">Total projected</td><td class="td-right">${t.homeCurrency} ${fmt(total)}</td><td></td></tr></tfoot>
    </table></div>`;

  // Packing list
  if(t.packingList && t.packingList.length) {
    const cats = ['Documents','Clothing','Toiletries','Electronics','Gear','Medication','Other'];
    html += `<div class="section" style="margin-top:40px"><h2 style="font-family:var(--serif);margin-bottom:16px">Packing list</h2>`;
    cats.forEach(cat => {
      const items = t.packingList.filter(i=>i.category===cat);
      if(!items.length) return;
      html += `<div class="pack-cat"><div class="pack-cat-label">${cat}</div><div class="pack-grid">${items.map(i=>`<div class="pack-item ${i.packed?'done':''}"><span class="pack-check ${i.packed?'checked':''}">${i.packed?'✓':''}</span>${esc(i.text)}</div>`).join('')}</div></div>`;
    });
    html += `</div>`;
  }

  html += `<\/body><\/html>`;
  downloadHTML(html, (t.name||'trip') + '_itinerary');
}

async function fetchWeather(segId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const city = seg.city || seg.name;
  toast('Fetching weather data…');
  try{
    // Step 1: geocode the city
    const coords = await geocodeCity(city);
    if(!coords){ toast('Could not locate ' + city); return; }

    // Step 2: determine date range for climatology
    const startMonth = seg.startDate ? new Date(seg.startDate + ' 00:00').getMonth() + 1 : new Date().getMonth() + 1;
    const endMonth = seg.endDate ? new Date(seg.endDate + ' 00:00').getMonth() + 1 : startMonth;

    // Step 3: fetch 30-year climate normals from Open-Meteo (free, no key)
    // Use forecast API with the actual dates if within 16 days, else climate normals
    const today = new Date();
    const tripStart = seg.startDate ? new Date(seg.startDate) : null;
    const daysUntil = tripStart ? Math.round((tripStart - today) / 86400000) : 999;

    let summary = '';

    if(daysUntil <= 16 && daysUntil >= -1 && seg.startDate && seg.endDate){
      // Actual forecast
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lng}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max&temperature_unit=celsius&start_date=${seg.startDate}&end_date=${seg.endDate}&timezone=auto`;
      const resp = await fetch(url);
      const data = await resp.json();
      if(data.daily){
        const d = data.daily;
        const avgMax = (d.temperature_2m_max.reduce((a,b)=>a+b,0)/d.temperature_2m_max.length).toFixed(1);
        const avgMin = (d.temperature_2m_min.reduce((a,b)=>a+b,0)/d.temperature_2m_min.length).toFixed(1);
        const totalRain = d.precipitation_sum.reduce((a,b)=>a+b,0).toFixed(1);
        const rainDays = d.precipitation_sum.filter(x=>x>0.5).length;
        summary = `📡 Live forecast for ${city}:
`;
        summary += `Temperatures: ${avgMin}°C – ${avgMax}°C average. `;
        summary += `Rain: ${rainDays} of ${d.temperature_2m_max.length} days expected, ${totalRain}mm total. `;
        const maxRainProb = Math.max(...(d.precipitation_probability_max||[0]));
        summary += `Max rain probability: ${maxRainProb}%. `;
        summary += avgMax > 28 ? 'Pack light, breathable clothing and sunscreen. ' : avgMax < 12 ? 'Pack warm layers. ' : 'Light layers recommended. ';
      }
    } else {
      // Climate normals — use a representative year
      const refYear = 2023;
      const sm = String(startMonth).padStart(2,'0');
      const em = String(endMonth).padStart(2,'0');
      const startDate = `${refYear}-${sm}-01`;
      const endDays = [31,28,31,30,31,30,31,31,30,31,30,31][endMonth-1];
      const endDate = `${refYear}-${em}-${endDays}`;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lng}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&temperature_unit=celsius&start_date=${startDate}&end_date=${endDate}&timezone=auto`;
      const resp = await fetch(url);
      const data = await resp.json();
      if(data.daily){
        const d = data.daily;
        const avgMax = (d.temperature_2m_max.reduce((a,b)=>a+b,0)/d.temperature_2m_max.length).toFixed(1);
        const avgMin = (d.temperature_2m_min.reduce((a,b)=>a+b,0)/d.temperature_2m_min.length).toFixed(1);
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const monthRange = startMonth === endMonth ? monthNames[startMonth-1] : `${monthNames[startMonth-1]}–${monthNames[endMonth-1]}`;
        summary = `🌡 Climate data for ${city} (${monthRange}):
`;
        summary += `Typical temperatures: ${avgMin}°C – ${avgMax}°C. `;
        const totalRain = d.precipitation_sum.reduce((a,b)=>a+b,0).toFixed(0);
        const rainDays = d.precipitation_sum.filter(x=>x>0.5).length;
        summary += `Rain: ~${rainDays} days/month typical, ~${totalRain}mm for the period. `;
        summary += avgMax > 30 ? 'Expect heat — pack light, breathable clothing, stay hydrated. ' : avgMax > 22 ? 'Warm and pleasant — light layers. ' : avgMax > 12 ? 'Mild — bring a light jacket. ' : 'Cool to cold — pack warm layers. ';
        summary += rainDays > 10 ? 'Pack a compact umbrella. ' : rainDays > 4 ? 'Light rain gear useful. ' : 'Generally dry period. ';
      }
    }

    if(!summary){ toast('No weather data available for this location.'); return; }
    seg.weatherSummary = summary;
    persist();
    renderSegment(segId);
    setTimeout(() => restoreSegTab(), 10);
    toast('Weather data loaded ✓');
  } catch(e){ console.error(e); toast('Could not fetch weather — check your connection.'); }
}

async function fetchThingsToKnow(segId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  if(!aiAvailable()){ noAIToast(); return; }
  const city = seg.city || seg.name;
  toast('Generating local tips…');
  try{
    const text = await aiCall(
      'Return practical travel tips for a destination as plain text with short labelled sections. Cover: transport cards/passes, tipping customs, 3-5 useful local phrases with pronunciation, one cultural custom to be aware of, and one practical tip most tourists miss. Keep each section to 1-2 sentences. No markdown headers, just labels like "Transport:", "Tipping:", etc.',
      'Things to know for a traveller visiting ' + city + '.',
      500
    );
    seg.thingsToKnow = text;
    persist();
    renderSegment(segId);
    setTimeout(() => restoreSegTab(), 10);
    toast('Local tips generated ✓');
  } catch(e){
    if(e.message === 'NO_AI') noAIToast();
    else toast('Could not generate tips — check AI settings.');
  }
}

function movePlacedItem(segId, dayId, placeId, direction){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  if(!day || !day.placedItems) return;
  const idx = day.placedItems.indexOf(placeId);
  if(idx === -1) return;
  const newIdx = idx + direction;
  if(newIdx < 0 || newIdx >= day.placedItems.length) return;
  const tmp = day.placedItems[idx];
  day.placedItems[idx] = day.placedItems[newIdx];
  day.placedItems[newIdx] = tmp;
  persist();
  // Re-render just the drop zone
  const zone = document.getElementById('dropzone-' + dayId);
  if(zone){
    const newItems = (day.placedItems||[]).map((pid, i, arr) => {
      const place = seg.places.find(p => p.id == pid);
      if(!place) return '';
      return `<span class="placed-item" data-pid="${place.id}" style="display:inline-flex;align-items:center;gap:4px">
        <span style="display:flex;flex-direction:column;gap:0;margin-right:2px">
          <button onclick="movePlacedItem('${segId}','${dayId}','${place.id}',-1)" style="background:none;border:none;cursor:pointer;padding:0;font-size:11px;line-height:1;color:inherit;opacity:${i===0?'0.25':'0.8'};${i===0?'pointer-events:none':''}" title="Move up">▲</button>
          <button onclick="movePlacedItem('${segId}','${dayId}','${place.id}',1)" style="background:none;border:none;cursor:pointer;padding:0;font-size:11px;line-height:1;color:inherit;opacity:${i===arr.length-1?'0.25':'0.8'};${i===arr.length-1?'pointer-events:none':''}" title="Move down">▼</button>
        </span>
        ${placeTypeEmoji(place.type)} ${esc(place.name)}
        <button class="remove-placed" onclick="removePlacedItem('${segId}','${dayId}','${place.id}')">×</button>
      </span>`;
    }).join('');
    zone.innerHTML = newItems || '<span class="drop-hint">No places assigned yet</span>';
  }
}

function clearDoneItems(){
  if(!state.trip.checklist) return;

function duplicateTrip(){
  if(!state.trip){ toast('No trip to duplicate'); return; }
  const copy = JSON.parse(JSON.stringify(state.trip));
  copy.id = Date.now();
  copy.name = copy.name + ' (copy)';
  copy.createdAt = new Date().toISOString();
  // Reset all booking refs and statuses to planning
  copy.segments.forEach(seg => {
    ['travel','accommodation','departure'].forEach(pool => {
      (seg[pool]?.options||[]).forEach(opt => {
        opt.status = 'planning';
        opt.bookingRef = '';
        opt.id = Date.now() + Math.random();
      });
    });
    seg.id = Date.now() + Math.random();
    seg.reflection = '';
    seg.discoveryShown = [];
    (seg.places||[]).forEach(p => { p.id = Date.now() + Math.random(); p.status = 'planning'; p.assignedDays = []; });
    (seg.days||[]).forEach(d => { d.id = Date.now() + Math.random(); d.placedItems = []; });
  });
  copy.checklist = [];
  copy.packingList = [];
  state.trip = copy;
  persist();
  renderAll();
  showView('overview');
  toast('Trip duplicated ✓');
}

const _discSelectedTypes = {};

function toggleDiscovery(segId){
  const sid = String(segId).replace('.','_');
  const panel = document.getElementById('discovery-panel-' + sid);
  const chev = document.getElementById('discovery-chevron-' + sid);
  if(!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  chev.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function toggleDiscBudget(btn, segId){
  const isActive = btn.getAttribute('data-selected') === 'true';
  btn.setAttribute('data-selected', isActive ? 'false' : 'true');
  btn.style.background = isActive ? 'var(--surface)' : 'var(--blue-bg)';
  btn.style.borderColor = isActive ? 'var(--border)' : 'var(--blue-border)';
  btn.style.color = isActive ? 'var(--text)' : 'var(--blue)';
}

function toggleDiscType(btn, segId){
  const type = btn.getAttribute('data-type');
  // segId here is the CSS-safe sid (with _ not .) so use directly as key
  if(!_discSelectedTypes[segId]) _discSelectedTypes[segId] = new Set();
  if(_discSelectedTypes[segId].has(type)){
    _discSelectedTypes[segId].delete(type);
    btn.style.background = 'var(--surface)';
    btn.style.borderColor = 'var(--border)';
    btn.style.color = 'var(--text)';
  } else {
    _discSelectedTypes[segId].add(type);
    btn.style.background = 'var(--amber-bg)';
    btn.style.borderColor = 'var(--amber-border)';
    btn.style.color = 'var(--amber)';
  }
}

async function discoverPlaces(segId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const sid = String(seg.id).replace('.','_'); // CSS-safe for DOM lookups
  const city = seg.city || seg.name;
  const typeSel = _discSelectedTypes[sid] || new Set();
  const types = typeSel.size > 0 ? [...typeSel] : ['eat','do','see','hike','other'];
  const budgetBtns = document.querySelectorAll('#disc-budgets-' + sid + ' [data-budget]');
  const selectedBudgets = [...budgetBtns].filter(b => b.getAttribute('data-selected') === 'true').map(b => b.getAttribute('data-budget'));
  const budget = selectedBudgets.join(',');
  const vibe = document.getElementById('disc-vibe-' + sid)?.value.trim() || '';
  const count = parseInt(document.getElementById('disc-count-' + sid)?.value) || 8;
  const resultsEl = document.getElementById('discovery-results-' + sid);

  if(!aiAvailable()){ noAIToast(); return; }
  resultsEl.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px;padding:12px 0"><div class="spinner"></div> Finding suggestions for ${esc(city)}…</div>`;

  // What's already in the list or been shown before
  const existingNames = (seg.places||[]).map(p => p.name.toLowerCase());
  const shownBefore = seg.discoveryShown || [];

  const budgetMap = {
    'free': 'free or zero cost',
    'budget': 'inexpensive ($ to $$)',
    'mid': 'mid-range ($$–$$$)',
    'splurge': 'special occasion or premium ($$$+)'
  };
  const budgetGuide = selectedBudgets.length
    ? selectedBudgets.map(b => budgetMap[b]).filter(Boolean).join(' or ')
    : 'any budget level';

  const dateContext = seg.startDate
    ? `The visit is in ${new Date(seg.startDate + ' 00:00').toLocaleDateString('en',{month:'long',year:'numeric'})}.`
    : '';

  const avoidList = [...existingNames, ...shownBefore.map(n=>n.toLowerCase())].slice(0, 40);

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getAIConfig().anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens: 4000,
        system: `You are a knowledgeable travel curator. Return ONLY a valid JSON array, no markdown, no explanation.
Each item: {"name":"place name","type":"eat|do|see|hike|other","description":"1-2 sentences, specific and concrete","cost":"free|$|$$|$$$|$$$$","popularity":"popular|hidden gem","cuisine":"if eat only","priceRange":"$ $$ $$$ or $$$$ if eat only","difficulty":"Easy|Moderate|Hard if hike only","distance":"if hike only","estimatedTime":"if hike or do only","category":"if see only","hours":"if see or eat only"}
Include null for fields not relevant to the type. Vary suggestions between well-known and lesser-known. Be specific — real names, real dishes, real trails. Omit any from this list: ${avoidList.length ? avoidList.slice(0,20).join(', ') : 'none'}.`,
        messages:[{role:'user', content:`Suggest ${count} things to do in ${city} for a traveller interested in: ${types.join(', ')}. Budget preference: ${budgetGuide}. ${vibe ? 'Vibe/focus: ' + vibe + '.' : ''} ${dateContext} Return as a JSON array.`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();

    // Parse with fallback: if truncated, salvage complete objects
    let suggestions;
    try {
      suggestions = JSON.parse(text);
    } catch(e) {
      // Try to recover by finding the last complete JSON object in the array
      const lastComplete = text.lastIndexOf('},');
      const lastCompleteAlt = text.lastIndexOf('}]');
      const cutAt = Math.max(lastComplete, lastCompleteAlt);
      if(cutAt > 0){
        try {
          const salvaged = text.substring(0, cutAt + 1) + ']';
          suggestions = JSON.parse(salvaged);
          console.log('Salvaged', suggestions.length, 'suggestions from truncated response');
        } catch(e2){
          resultsEl.innerHTML = '<div style="font-size:13px;color:var(--red);padding:8px 0">Could not parse suggestions — try a smaller count.</div>';
          return;
        }
      } else {
        resultsEl.innerHTML = '<div style="font-size:13px;color:var(--red);padding:8px 0">Could not parse suggestions — try a smaller count.</div>';
        return;
      }
    }

    if(!Array.isArray(suggestions) || !suggestions.length){
      resultsEl.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:8px 0">No suggestions returned — try different filters.</div>';
      return;
    }

    // Record what was shown so we don't repeat
    if(!seg.discoveryShown) seg.discoveryShown = [];
    suggestions.forEach(s => {
      if(s.name && !seg.discoveryShown.includes(s.name)) seg.discoveryShown.push(s.name);
    });
    persist();

    // Render suggestion cards
    const alreadyAdded = new Set((seg.places||[]).map(p => p.name.toLowerCase()));

    resultsEl.innerHTML = `
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${suggestions.length} suggestions — tap to add to your places list. <button onclick="discoverPlaces('${segId}')" style="background:none;border:none;color:var(--amber);font-size:12px;cursor:pointer;font-family:var(--font)">Find more →</button></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">
        ${suggestions.map((s,i) => {
          const isAdded = alreadyAdded.has((s.name||'').toLowerCase());
          const safeId = 'disc-sug-' + segId + '-' + i;
          const details = [s.difficulty, s.distance, s.estimatedTime, s.cuisine, s.hours, s.category].filter(Boolean).join(' · ');
          return `<div id="${safeId}" style="border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;background:var(--surface);display:flex;flex-direction:column;gap:6px;transition:border-color .15s">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
              <div style="font-weight:500;font-size:13px;line-height:1.3">${esc(s.name||'')}</div>
              <span style="font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;background:${s.popularity==='hidden gem'?'var(--green-bg)':'var(--surface2)'};color:${s.popularity==='hidden gem'?'var(--green)':'var(--text3)'}">${s.popularity||'popular'}</span>
            </div>
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <span style="font-size:12px">${placeTypeEmoji(s.type||'other')} ${s.type||'other'}</span>
              ${s.cost ? `<span style="font-size:12px;color:var(--text2)">${s.cost}</span>` : ''}
            </div>
            <div style="font-size:12px;color:var(--text2);line-height:1.5">${esc(s.description||'')}</div>
            ${details ? `<div style="font-size:11px;color:var(--text3)">${esc(details)}</div>` : ''}
            <button onclick="addDiscoverySuggestion('${segId}',${i},this)" ${isAdded?'disabled':''} style="margin-top:4px;padding:6px 12px;border-radius:var(--radius);border:1.5px solid ${isAdded?'var(--green-border)':'var(--border)'};background:${isAdded?'var(--green-bg)':'var(--surface)'};color:${isAdded?'var(--green)':'var(--text2)'};font-family:var(--font);font-size:12px;cursor:${isAdded?'default':'pointer'};font-weight:500">
              ${isAdded ? '✓ Added' : '+ Add to list'}
            </button>
          </div>`;
        }).join('')}
      </div>`;

    // Store suggestions data for addDiscoverySuggestion to access
    window['_disc_' + segId] = suggestions;

  } catch(e){
    console.error(e);
    resultsEl.innerHTML = '<div style="font-size:13px;color:var(--red)">Could not fetch suggestions — check connection.</div>';
  }
}

function addDiscoverySuggestion(segId, idx, btn){
  const suggestions = window['_disc_' + segId];
  if(!suggestions || !suggestions[idx]) return;
  const s = suggestions[idx];
  const seg = state.trip.segments.find(seg => seg.id == segId);
  if(!seg) return;

  const newPlace = emptyPlace();
  newPlace.name = s.name || '';
  newPlace.type = s.type || 'other';
  newPlace.notes = s.description || '';
  newPlace.priceRange = s.priceRange || s.cost || '';
  newPlace.cuisine = s.cuisine || '';
  newPlace.category = s.category || '';
  newPlace.difficulty = s.difficulty || '';
  newPlace.distance = s.distance || '';
  newPlace.estimatedTime = s.estimatedTime || '';
  newPlace.hours = s.hours || '';

  if(!seg.places) seg.places = [];
  seg.places.push(newPlace);
  persist();

  btn.textContent = '✓ Added';
  btn.disabled = true;
  btn.style.background = 'var(--green-bg)';
  btn.style.borderColor = 'var(--green-border)';
  btn.style.color = 'var(--green)';

  // Refresh just the places list without full re-render
  const listEl = document.getElementById('places-list-' + segId);
  if(listEl) listEl.innerHTML = (seg.places||[]).map(p => renderPlaceItem(p, seg)).join('');

  toast(s.name + ' added to places list');
}

async function suggestDayPlan(segId, dayId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  if(!day) return;

  const unassigned = (seg.places||[]).filter(p => !p.assignedDays || p.assignedDays.length === 0);
  if(!unassigned.length){ toast('No unassigned places left — add more to the places list first'); return; }

  const dayIdx = seg.days.indexOf(day);
  const dow = day.date ? new Date(day.date+' 00:00').toLocaleDateString('en',{weekday:'long'}) : 'Day '+(dayIdx+1);

  // Get context on adjacent days to avoid back-to-back hard hikes etc
  const prevDay = dayIdx > 0 ? seg.days[dayIdx-1] : null;
  const nextDay = dayIdx < seg.days.length-1 ? seg.days[dayIdx+1] : null;

  const getPlacedNames = (d) => (d?.placedItems||[]).map(pid => {
    const p = seg.places.find(x=>x.id==pid); return p?p.name:'';
  }).filter(Boolean);

  if(!aiAvailable()){ noAIToast(); return; }
  toast('Getting day plan suggestions…');

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getAIConfig().anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens: 400,
        system: `You are a trip planning assistant. Given a list of places and context about a day, suggest which places to assign to that day. Return ONLY a JSON object: {"places":["name1","name2"],"reasoning":"one sentence explaining the logic","notes":"optional practical tip for the day"}. Choose 2-4 places that make sense together geographically and by energy level. Don't put two hard hikes on the same day. Mix types where possible.`,
        messages:[{role:'user', content: `City: ${seg.city||seg.name}. Day: ${dow}${day.date?' ('+fmtDate(day.date)+')':''}.
Unassigned places available: ${unassigned.map(p=>`${p.name} (${p.type}${p.difficulty?', '+p.difficulty:''})`).join(', ')}.
${prevDay && getPlacedNames(prevDay).length ? 'Previous day had: '+getPlacedNames(prevDay).join(', ')+'.' : ''}
${nextDay && getPlacedNames(nextDay).length ? 'Next day has: '+getPlacedNames(nextDay).join(', ')+'.' : ''}
Which places should go on this day? Return JSON only.`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const result = JSON.parse(text);

    if(!result.places || !result.places.length){ toast('No suggestions — try adding more places to the list'); return; }

    // Show confirmation modal
    const matchedPlaces = result.places.map(name => unassigned.find(p => p.name.toLowerCase().includes(name.toLowerCase()))).filter(Boolean);
    if(!matchedPlaces.length){ toast('Could not match suggestions to your places'); return; }

    openModal(`
      <div class="modal-header">
        <h2>Suggested day plan</h2>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${esc(dow)}${day.date?' · '+fmtDate(day.date):''}</div>
        <div style="margin-bottom:12px">
          ${matchedPlaces.map(p => `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
            <span>${placeTypeEmoji(p.type)}</span>
            <div>
              <div style="font-weight:500;font-size:13px">${esc(p.name)}</div>
              <div style="font-size:12px;color:var(--text3)">${esc(placeTypeDetails(p)||p.type)}</div>
            </div>
          </div>`).join('')}
        </div>
        ${result.reasoning ? `<div style="font-size:12px;color:var(--text2);font-style:italic;margin-bottom:8px">${esc(result.reasoning)}</div>` : ''}
        ${result.notes ? `<div style="font-size:12px;color:var(--amber);background:var(--amber-bg);padding:8px 10px;border-radius:var(--radius)">${esc(result.notes)}</div>` : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="applyDaySuggestion('${segId}','${dayId}',${JSON.stringify(matchedPlaces.map(p=>p.id))})">Apply suggestions</button>
      </div>
    `);
  } catch(e){
    console.error(e);
    toast('Could not generate suggestions');
  }
}

function applyDaySuggestion(segId, dayId, placeIds){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  if(!day) return;
  if(!day.placedItems) day.placedItems = [];

  placeIds.forEach(pid => {
    const place = seg.places.find(p => p.id == pid);
    if(!place) return;
    if(!day.placedItems.includes(pid)) day.placedItems.push(pid);
    if(!place.assignedDays) place.assignedDays = [];
    if(!place.assignedDays.includes(dayId)) place.assignedDays.push(dayId);
  });

  persist();
  closeModal();
  renderSegment(segId);
  setTimeout(() => {
    const daysTab = document.querySelector('.tab[onclick*="tab-days"]');
    if(daysTab) daysTab.click();
    // Expand the target day
    const dayBody = document.getElementById('day-body-'+dayId);
    if(dayBody){ dayBody.style.display='block'; dayBody.classList.add('open'); }
  }, 50);
  toast('Day plan applied ✓');
}

function renderBookingsView(){
  const t = state.trip;
  const el = document.getElementById('view-bookings');
  if(!t){ el.innerHTML = '<div class="empty"><div class="empty-text">No trip loaded</div></div>'; return; }

  const items = [];
  (t.segments||[]).forEach(seg => {
    const pools = [
      { label: 'Travel to ' + (seg.city||seg.name), opts: seg.travel?.options||[], selIdx: seg.travel?.selectedIndex||0 },
      { label: 'Accommodation in ' + (seg.city||seg.name), opts: seg.accommodation?.options||[], selIdx: seg.accommodation?.selectedIndex||0 },
      { label: 'Departure from ' + (seg.city||seg.name), opts: seg.departure?.options||[], selIdx: seg.departure?.selectedIndex||0 },
    ];
    pools.forEach(pool => {
      const opt = pool.opts[pool.selIdx];
      if(opt && (opt.status === 'confirmed' || opt.status === 'booked')){
        items.push({ segment: seg.city||seg.name, label: pool.label, name: opt.name, status: opt.status, bookingRef: opt.bookingRef, price: opt.price, currency: opt.currency, departureTime: opt.departureTime, arrivalTime: opt.arrivalTime, checkIn: opt.checkIn, checkOut: opt.checkOut, mode: opt.mode });
      }
    });
    (seg.places||[]).filter(p => p.status === 'confirmed' || p.status === 'booked').forEach(p => {
      items.push({ segment: seg.city||seg.name, label: seg.city||seg.name, name: p.name, status: p.status, bookingRef: '', price: p.price, currency: p.currency });
    });
  });

  el.innerHTML = `
    <div class="section-title">Bookings</div>
    <div class="section-sub">All confirmed and booked items with references</div>
    ${items.length === 0
      ? `<div class="card"><div class="empty"><div class="empty-text">No confirmed or booked items yet — mark options as confirmed or booked to see them here</div></div></div>`
      : `<div class="card" style="padding:0;overflow:hidden">
          ${items.map((item,i) => `
            <div style="padding:14px 18px;${i<items.length-1?'border-bottom:1px solid var(--border)':''}">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
                <div style="flex:1;min-width:0">
                  <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">${esc(item.label)}</div>
                  <div style="font-weight:500;font-size:14px;margin-bottom:4px">${esc(item.name)}</div>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--text2)">
                    ${item.mode ? `<span>${item.mode}</span>` : ''}
                    ${item.departureTime ? `<span>Dep ${item.departureTime}</span>` : ''}
                    ${item.arrivalTime ? `<span>Arr ${item.arrivalTime}</span>` : ''}
                    ${item.checkIn ? `<span>In ${item.checkIn}</span>` : ''}
                    ${item.checkOut ? `<span>Out ${item.checkOut}</span>` : ''}
                    ${item.price ? `<span style="font-weight:500;color:var(--text)">${item.currency||t.homeCurrency} ${item.price}</span>` : ''}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
                  <span class="status status-${item.status}">${item.status}</span>
                  ${item.bookingRef ? `<span style="font-family:var(--mono);font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:4px">${esc(item.bookingRef)}</span>` : ''}
                </div>
              </div>
            </div>`).join('')}
        </div>`
    }`;
}

async function fetchCultureGuide(){
  const t = state.trip;
  if(!t) return;

  const cities = [...new Set(t.segments.map(s=>s.city||s.name).filter(Boolean))];
  if(!cities.length){ toast('Add segments with city names first'); return; }

  // Group cities by country context — pass all destinations so Haiku
  // can identify which countries are involved and section accordingly
  const dateContext = t.startDate
    ? new Date(t.startDate+' 00:00').toLocaleDateString('en',{month:'long',year:'numeric'})
    : '';

  if(!aiAvailable()){ noAIToast(); return; }
  const btn = document.getElementById('culture-guide-btn');
  if(btn){ btn.textContent = '…'; btn.disabled = true; }
  toast('Generating culture guide…');

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':getAIConfig().anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1200,
        system:`Generate a practical culture and language guide for a traveller. Use this exact structure with these exact section labels on their own lines, followed by the content. If the trip spans multiple countries, add a country heading before the relevant sections.

Etiquette:
[3-5 specific customs that could embarrass or cause offence if unknown — concrete situations, not vague generalities]

Social customs:
[2-3 norms around greetings, personal space, dining, or public behaviour that differ meaningfully from Western norms]

Things that surprise visitors:
[2-3 genuinely unexpected practical or cultural realities — the kind of thing most guidebooks miss]

Essential phrases:
[6-8 phrases that actually get used daily: please, thank you, excuse me, sorry, where is the toilet, I don't understand, do you speak English, how much — with romanisation and approximate pronunciation if non-Latin script]

Useful to know:
[2-3 practical language tips: which script to learn to recognise, how to use translation apps effectively, anything specific about the local communication style]

Keep each section tight — one or two sentences per point, no padding.`,
        messages:[{role:'user', content:`Destinations: ${cities.join(', ')}. Travel period: ${dateContext||'not specified'}. Traveller's home currency suggests: ${t.homeCurrency}.`}]
      })
    });

    const data = await resp.json();
    const text = (data.content||[]).map(c=>c.text||'').join('').trim();
    if(!text){ toast('No response — try again'); return; }

    t.cultureGuide = text;
    persist();
    renderOverview();
    toast('Culture guide generated ✓');
  } catch(e){
    console.error(e);
    toast('Could not generate guide — check connection');
    if(btn){ btn.textContent = t.cultureGuide ? 'Refresh' : 'Generate guide'; btn.disabled = false; }
  }
}

let _searchTimers = {};

async function placeSearch(input, suggId, latId, lngId){
  const val = input.value.trim();
  const suggEl = document.getElementById(suggId);
  if(!suggEl) return;
  if(val.length < 2){ suggEl.style.display = 'none'; return; }

  clearTimeout(_searchTimers[suggId]);
  _searchTimers[suggId] = setTimeout(async () => {
    try{
      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=5&addressdetails=1&q=' + encodeURIComponent(val);
      const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const results = await resp.json();
      if(!results.length){ suggEl.style.display = 'none'; return; }
      suggEl.innerHTML = results.map(r => {
        const parts = r.display_name.split(', ');
        const main = parts[0];
        const sub = parts.slice(1, 3).join(', ');
        const safeDisplay = (main + ', ' + sub).replace(/'/g,"&#39;");
        return `<div class="place-suggestion"
          onclick="selectPlace('${suggId}','${input.id}','${latId}','${lngId}',${r.lat},${r.lon},'${safeDisplay}')">
          <div class="ps-main">${esc(main)}</div>
          <div class="ps-sub">${esc(sub)}</div>
        </div>`;
      }).join('');
      suggEl.style.display = 'block';
    } catch(e){ suggEl.style.display = 'none'; }
  }, 600);
}

function selectPlace(suggId, inputId, latId, lngId, lat, lng, displayName){
  const parts = String(displayName).replace(/&#39;/g,"'").split(', ');

// ============================================================
// GEOCODE helper (city name → lat/lng via Haiku)
// ============================================================
const _geocodeCache = {};
async function geocodeCity(name){
  if(!name) return null;
  if(_geocodeCache[name]) return _geocodeCache[name];
  try{
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(name);
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    if(!resp.ok) return null;
    const r = await resp.json();
    if(r && r.length > 0){
      const result = { lat: parseFloat(r[0].lat), lng: parseFloat(r[0].lon) };
      _geocodeCache[name] = result;
      return result;
    }
  } catch(e){ console.warn('Geocode failed for', name, e); }
  return null;
}

async function buildTripMap(t){
  if(typeof L === 'undefined'){
    const mapEl = document.getElementById('trip-map');
    if(mapEl) mapEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Map requires an internet connection to load.</div>';
    return;
  }
  if(_tripMap){ _tripMap.remove(); _tripMap = null; }
  const mapEl = document.getElementById('trip-map');
  if(!mapEl) return;

  // Initialise map but don't set view yet — wait until all geocoding is done
  _tripMap = L.map('trip-map', { zoomControl: true, center: [20,0], zoom: 2 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(_tripMap);

  const SEG_COLORS = ['#b87d0a','#1a5fa8','#2d7a3a','#b52b2b','#7b4f9e','#c47a00','#0f6e6e','#c44080'];
  const legendEl = document.getElementById('map-legend');

  // Phase 1: resolve all coordinates first (all awaits complete before any markers drawn)
  const resolved = [];
  for(let i = 0; i < t.segments.length; i++){
    const seg = t.segments[i];
    const trav = seg.travel.options[seg.travel.selectedIndex||0];
    let coords = null;
    if(trav && trav.toLat && trav.toLng){
      coords = { lat: trav.toLat, lng: trav.toLng };
    } else if(seg.city){
      coords = await geocodeCity(seg.city);
    }
    resolved.push({ seg, coords, i });
  }

  // Handle departure from last segment
  let depCoords = null;
  const lastSeg = t.segments[t.segments.length - 1];
  if(lastSeg && lastSeg.departure){
    const dep = lastSeg.departure.options[lastSeg.departure.selectedIndex||0];
    if(dep && dep.toLat && dep.toLng){
      depCoords = { lat: dep.toLat, lng: dep.toLng, name: dep.toName||'Home' };
    } else if(dep && dep.toName){
      const gc = await geocodeCity(dep.toName);
      if(gc) depCoords = { ...gc, name: dep.toName };
    }
  }

  // Phase 2: now draw everything synchronously
  const points = [];
  for(const { seg, coords, i } of resolved){
    if(!coords) continue;
    const color = SEG_COLORS[seg.color % SEG_COLORS.length];
    points.push([coords.lat, coords.lng]);

    const icon = L.divIcon({
      className: '',
      html: `<div style="width:30px;height:30px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:sans-serif;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">${i+1}</div>`,
      iconSize: [30,30], iconAnchor: [15,15], popupAnchor: [0,-18]
    });

    const nights = seg.startDate && seg.endDate
      ? calcNights(seg.startDate,seg.endDate)
      : null;
    const accOpt = seg.accommodation.options[seg.accommodation.selectedIndex||0];
    const segId = seg.id;

    L.marker([coords.lat, coords.lng], {icon})
      .addTo(_tripMap)
      .bindPopup(`<div style="font-family:sans-serif;font-size:13px;min-width:140px">
        <div style="font-weight:600;margin-bottom:3px">${seg.city||seg.name}</div>
        ${nights ? `<div style="color:#666;font-size:12px">${nights} nights</div>` : ''}
        ${seg.startDate ? `<div style="color:#999;font-size:11px">${fmtDate(seg.startDate)}${seg.endDate?' → '+fmtDate(seg.endDate):''}</div>` : ''}
        ${accOpt && accOpt.name ? `<div style="color:#555;font-size:11px;margin-top:3px">🏨 ${accOpt.name}</div>` : ''}
        <div style="margin-top:6px"><a href="#" onclick="showSegment('${segId}');return false;" style="font-size:12px;color:#1a5fa8;text-decoration:none">View segment →</a></div>
      </div>`);

    if(legendEl){
      legendEl.innerHTML += `<div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:20px">
        <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <span>${i+1}. ${seg.city||seg.name}</span>
      </div>`;
    }
  }

  // Departure marker
  if(depCoords){
    points.push([depCoords.lat, depCoords.lng]);
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:28px;height:28px;border-radius:50%;background:#555;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">🏠</div>`,
      iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]
    });
    L.marker([depCoords.lat, depCoords.lng],{icon}).addTo(_tripMap)
      .bindPopup(`<div style="font-family:sans-serif;font-size:13px"><div style="font-weight:600">${depCoords.name}</div><div style="color:#999;font-size:11px">Return destination</div></div>`);
  }

  // Route polyline
  if(points.length > 1){
    L.polyline(points, {
      color: '#b87d0a',
      weight: 2.5,
      opacity: 0.7,
      dashArray: '8, 6'
    }).addTo(_tripMap);
  }

  // Fit bounds now that all markers are placed
  _tripMap.invalidateSize();
  if(points.length > 1){
    _tripMap.fitBounds(L.latLngBounds(points), { padding: [48, 48] });
  } else if(points.length === 1){
    _tripMap.setView(points[0], 9);
  }
}

let _segMaps = {};

async function buildSegMiniMap(seg){
  if(typeof L === 'undefined') return;
  const mapId = 'seg-map-' + seg.id;
  const mapEl = document.getElementById(mapId);
  if(!mapEl) return;

  if(_segMaps[seg.id]){ _segMaps[seg.id].remove(); delete _segMaps[seg.id]; }

  const map = L.map(mapId, { zoomControl: false, scrollWheelZoom: false });
  _segMaps[seg.id] = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);
  map.invalidateSize();

  const SEG_COLORS = ['#b87d0a','#1a5fa8','#2d7a3a','#b52b2b','#7b4f9e','#c47a00','#0f6e6e','#c44080'];
  const color = SEG_COLORS[seg.color % SEG_COLORS.length];
  const points = [];

  // Try travel-in destination first, else geocode city
  const trav = seg.travel.options[seg.travel.selectedIndex||0];
  let cityCoords = null;
  if(trav && trav.toLat && trav.toLng){
    cityCoords = { lat: trav.toLat, lng: trav.toLng };
  } else if(seg.city){
    cityCoords = await geocodeCity(seg.city);
  }

  if(cityCoords){
    points.push([cityCoords.lat, cityCoords.lng]);
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:28px;height:28px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;font-family:DM Sans,sans-serif;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)">📍</div>`,
      iconSize:[28,28],iconAnchor:[14,14]
    });
    L.marker([cityCoords.lat, cityCoords.lng],{icon}).addTo(map)
      .bindPopup(`<div class="map-popup"><strong>${seg.city||seg.name}</strong></div>`);
  }

  // Plot places that have been assigned coordinates (future enhancement)
  // For now just centre on the city
  if(points.length > 0){
    map.setView(points[0], 11);
  } else {
    map.setView([20,0], 2);
  }

  setTimeout(() => map.invalidateSize(), 100);
}

async function estimateTravelCost(segId, type, optId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const pool = type === 'travel' ? seg.travel : type === 'departure' ? seg.departure : null;
  if(!pool) return;
  const opt = pool.options.find(o => o.id == optId);
  if(!opt) return;

  const from = opt.fromName || (type === 'departure' ? (seg.city||seg.name) : '');
  const to = opt.toName || (type === 'travel' ? (seg.city||seg.name) : '');
  const mode = opt.mode || 'train';
  const date = seg.startDate || '';
  const name = opt.name || '';

  const journeyDesc = name || (from && to ? `${from} to ${to}` : from || to);
  if(!journeyDesc){
    toast('Add a name or From/To locations to the option first');
    return;
  }

  if(!aiAvailable()){
    toast('Configure an AI provider in ⚙ Settings to use cost estimation');
    return;
  }

  const cardEl = document.querySelector(`[id="optcard-${opt.id}"]`);
  const estimateBtn = cardEl ? cardEl.querySelector('.btn-amber') : null;
  if(estimateBtn){ estimateBtn.textContent = '…'; estimateBtn.disabled = true; }
  toast('Estimating cost…');

  try{
    const prompt = from && to
      ? `Estimate single-passenger cost: ${from} to ${to} by ${mode}${date ? ', ' + new Date(date+' 00:00').toLocaleDateString('en',{month:'long',year:'numeric'}) : ''}${name ? '. Route name: '+name : ''}`
      : `Estimate single-passenger cost for this journey: "${journeyDesc}" by ${mode}${date ? ', ' + new Date(date+' 00:00').toLocaleDateString('en',{month:'long',year:'numeric'}) : ''}`;

    const raw = await aiCall(
      'Return ONLY valid JSON, no markdown: {"price":"numeric only","currency":"3-letter ISO code for origin country","note":"one phrase e.g. reserved seat approx"}. If genuinely unknown return {"price":null,"currency":null,"note":"unknown route"}.',
      prompt,
      120
    );

    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());

    if(parsed.price && parsed.currency){
      opt.price = String(parsed.price);
      opt.currency = parsed.currency;
      if(parsed.note) opt.notes = (opt.notes ? opt.notes + ' · ' : '') + parsed.note + ' (estimated)';
      persist();
      renderSegment(segId);
      renderBudgetBar();
      setTimeout(() => restoreSegTab(), 10);
      toast(`Estimated: ${parsed.currency} ${parsed.price}${parsed.note ? ' — '+parsed.note : ''}`);
    } else {
      toast('Could not estimate — enter cost manually');
      if(estimateBtn){ estimateBtn.textContent = '~ Estimate cost'; estimateBtn.disabled = false; }
    }
  } catch(e){
    if(e.message === 'NO_AI') toast('Configure an AI provider in ⚙ Settings');
    else toast('Estimation failed — enter cost manually');
    if(estimateBtn){ estimateBtn.textContent = '~ Estimate cost'; estimateBtn.disabled = false; }
  }
}

// ============================================================
function getAIConfig(){
  return {
    anthropicKey: localStorage.getItem('tc_anthropic_key') || '',
    ollamaUrl: localStorage.getItem('tc_ollama_url') || '',
    ollamaModel: localStorage.getItem('tc_ollama_model') || 'llama3.1',
    ollamaKey: localStorage.getItem('tc_ollama_key') || '',
  };
}

function aiAvailable(){
  const cfg = getAIConfig();
  return !!(cfg.anthropicKey || cfg.ollamaUrl);
}

async function aiCall(system, userMsg, maxTokens){
  const cfg = getAIConfig();
  if(!cfg.anthropicKey && !cfg.ollamaUrl) throw new Error('NO_AI');

  if(cfg.anthropicKey){
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': cfg.anthropicKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: maxTokens || 800,
        system, messages: [{ role: 'user', content: userMsg }]
      })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message || 'API error');
    return (data.content||[]).map(c=>c.text||'').join('').trim();
  }

  if(cfg.ollamaUrl){
    const base = cfg.ollamaUrl.replace(/\/$/, '');
    const headers = { 'Content-Type': 'application/json' };
    if(cfg.ollamaKey) headers['Authorization'] = 'Bearer ' + cfg.ollamaKey;
    const resp = await fetch(base + '/api/chat', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: cfg.ollamaModel,
        stream: false,
        messages: [
          { role: 'system', content: system },
          { role: 'user', content: userMsg }
        ]
      })
    });
    if(!resp.ok) throw new Error('Ollama API error: ' + resp.status);
    const data = await resp.json();
    return (data.message?.content || '').trim();
  }
}

  if(step===7) return buildWizStep7();
  return '';
}
