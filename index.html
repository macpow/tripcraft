<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TripCraft</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b87d0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TripCraft">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;
  --surface:#ffffff;
  --surface2:#f2f1ee;
  --border:#e2e0db;
  --border2:#d0cdc7;
  --text:#1a1916;
  --text2:#6b6860;
  --text3:#9e9b96;
  --amber:#b87d0a;
  --amber-bg:#fdf3dc;
  --amber-border:#e8c97a;
  --green:#2d7a3a;
  --green-bg:#eaf4ec;
  --green-border:#86c98f;
  --red:#b52b2b;
  --red-bg:#fdf0f0;
  --red-border:#e8a0a0;
  --blue:#1a5fa8;
  --blue-bg:#eef4fd;
  --blue-border:#90baf0;
  --radius:8px;
  --radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
h1{font-size:20px;font-weight:500;letter-spacing:-0.3px}
h2{font-size:16px;font-weight:500;letter-spacing:-0.2px}
h3{font-size:14px;font-weight:500}
button{font-family:var(--font);cursor:pointer;border:none;background:none;font-size:14px}
input,textarea,select{font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--text3)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
select{cursor:pointer}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200}
#topbar-left{display:flex;align-items:center;gap:12px}
#topbar-right{display:flex;align-items:center;gap:6px}
.wordmark{font-size:15px;font-weight:500;letter-spacing:-0.3px;color:var(--text)}
.wordmark span{color:var(--amber);font-weight:300}
#trip-name-display{font-size:13px;color:var(--text2);padding-left:12px;border-left:1px solid var(--border)}
#main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
#sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;transition:transform .25s ease}
#content{flex:1;overflow-y:auto;padding:28px 32px}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150}
#menu-btn{display:none;background:none;border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:18px;line-height:1;color:var(--text2);cursor:pointer}
#topbar-actions{display:flex;align-items:center;gap:6px}

@media(max-width:680px){
  #topbar{padding:0 12px}
  #trip-name-display{display:none}
  #menu-btn{display:flex;align-items:center;justify-content:center}
  #topbar-actions .btn-ghost{display:none}
  #topbar-actions .mobile-only{display:inline-flex}
  #main{position:relative;overflow:hidden}
  #sidebar{position:fixed;top:52px;left:0;bottom:0;z-index:160;transform:translateX(-100%);width:280px;box-shadow:4px 0 20px rgba(0,0,0,.12)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-overlay.open{display:block}
  #content{padding:16px 14px;width:100%}
  .two-col{grid-template-columns:1fr}
  .three-col{grid-template-columns:1fr 1fr}
  .form-group{grid-template-columns:1fr}
  .modal{border-radius:var(--radius-lg) var(--radius-lg) 0 0;max-height:92vh;margin-top:auto}
  .modal-overlay{align-items:flex-end;padding:0}
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0;padding:8px 12px}
  .card{padding:14px 14px}
  .section-title{font-size:18px}
  .option-actions{flex-wrap:wrap;gap:6px}
  .day-header{padding:10px 10px;gap:6px}
  .day-body{padding:10px 10px 12px}
  .welcome-stat-num{font-size:22px}
  .place-item{padding:8px 10px}
}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:400;transition:all .15s;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--text);color:#fff;border:1px solid var(--text)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border2)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.btn-amber:hover{opacity:.85}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.btn-danger:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;border-radius:var(--radius);border:1px solid var(--border);color:var(--text2);background:transparent}
.btn-icon:hover{background:var(--surface2)}
.icon-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;display:inline-flex;align-items:center}
.icon-btn:hover{color:var(--text);background:var(--surface2)}

/* Sidebar */
.sidebar-section{padding:16px 12px 8px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;padding:0 8px;margin-bottom:6px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s;border:none;background:none;width:100%;text-align:left}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--surface2);color:var(--text);font-weight:500}
.sidebar-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-item .badge{margin-left:auto;font-size:11px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:10px}
.sidebar-item.active .badge{background:var(--border);color:var(--text2)}
.sidebar-add{padding:8px 12px}

/* Budget bar */
#budget-bar{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.budget-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.budget-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.budget-total{font-size:18px;font-weight:500;letter-spacing:-0.5px}
.budget-booked{font-size:12px;color:var(--text2)}
.budget-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.budget-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .3s}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.card-actions{display:flex;gap:6px}

/* Status badges */
.status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.status-planning{background:var(--surface2);color:var(--text3)}
.status-confirmed{background:var(--amber-bg);color:var(--amber)}
.status-booked{background:var(--green-bg);color:var(--green)}

/* Segment nav colors */
.seg-color-0{background:#e8c97a}
.seg-color-1{background:#90baf0}
.seg-color-2{background:#86c98f}
.seg-color-3{background:#e8a0a0}
.seg-color-4{background:#c4a8e8}
.seg-color-5{background:#f0c090}
.seg-color-6{background:#a0d8d0}
.seg-color-7{background:#f0a0c0}

/* Section headers in content */
.section-title{font-size:22px;font-weight:300;letter-spacing:-0.5px;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.section-sep{height:1px;background:var(--border);margin:24px 0}

/* Two col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Accommodation / Travel card */
.option-row{display:flex;flex-direction:column;gap:10px}
.option-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;background:var(--surface);position:relative}
.option-card.primary{border-color:var(--text);border-width:1.5px}
.option-card.alternate{background:var(--surface2);opacity:.8}
.option-name{font-weight:500;margin-bottom:4px;font-size:14px}
.option-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text2);margin-bottom:8px}
.option-meta span{display:flex;align-items:center;gap:3px}
.option-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.option-price{font-size:16px;font-weight:500;letter-spacing:-0.3px}
.option-price-sub{font-size:11px;color:var(--text3)}

/* Day list */
.day-row{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;background:var(--surface)}
.day-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.day-header:hover{background:var(--surface2)}
.day-num{font-size:11px;font-weight:500;color:var(--text3);min-width:36px}
.day-date{font-size:13px;color:var(--text2)}
.day-title{flex:1;font-size:13px;font-weight:400}
.day-tags{display:flex;gap:4px;flex-wrap:wrap}
.day-tag{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.day-chevron{color:var(--text3);font-size:12px;transition:transform .15s}
.day-chevron.open{transform:rotate(180deg)}
.day-body{padding:12px 14px 14px;border-top:1px solid var(--border);display:none}
.day-body.open{display:block}
.day-drop-zone{min-height:40px;border:1.5px dashed var(--border);border-radius:var(--radius);padding:8px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}
.day-drop-zone.drag-over{border-color:var(--amber);background:var(--amber-bg)}
.placed-item{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue);border-radius:20px;font-size:12px;cursor:default}
.placed-item .remove-placed{background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;padding:0 0 0 2px;line-height:1}
.placed-item .remove-placed:hover{color:var(--red)}
.drop-hint{font-size:12px;color:var(--text3);padding:4px;align-self:center}

/* Places list */
.place-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:8px;cursor:grab;transition:box-shadow .15s}
.place-item:hover{box-shadow:var(--shadow)}
.place-item.dragging{opacity:.5;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.place-type{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.place-type-eat{background:#fef0e0;color:#c47a00}
.place-type-do{background:#e8f0fe;color:#1a5fa8}
.place-type-see{background:#eaf4ec;color:#2d7a3a}
.place-type-hike{background:#f0ebe8;color:#8b4513}
.place-type-other{background:var(--surface2);color:var(--text2)}
.place-info{flex:1;min-width:0}
.place-name{font-weight:500;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.place-details{font-size:12px;color:var(--text2)}
.place-day-tag{font-size:10px;padding:1px 6px;border-radius:8px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);white-space:nowrap}
.place-price{font-size:12px;font-weight:500;margin-top:2px;color:var(--text)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;display:block}
.form-hint{font-size:11px;color:var(--text3);margin-top:3px}
.form-group{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* URL extractor */
.url-extract-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:10px}
.url-extract-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:8px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}

/* Overview / welcome */
.welcome-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;text-align:center}
.welcome-stat-num{font-size:28px;font-weight:300;letter-spacing:-1px}
.welcome-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Travel leg icon */
.travel-mode{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:12px;background:var(--surface2);color:var(--text2)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-text{font-size:13px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:2000;animation:fadeup .3s ease;max-width:300px}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Loading indicator */
.loading-dots{display:inline-flex;gap:4px}
.loading-dots span{width:5px;height:5px;background:currentColor;border-radius:50%;animation:bounce .8s infinite alternate}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-5px);opacity:.5}}

/* Print styles */
@media print{
  #topbar,#sidebar,#budget-bar,.btn,.icon-btn,.tab,button{display:none!important}
  #main{display:block;height:auto}
  #content{padding:0;overflow:visible}
  .card{break-inside:avoid;box-shadow:none}
  .day-body{display:block!important}
  body{font-size:11px}
}

/* Drag indicator line */
.drag-indicator{height:2px;background:var(--amber);border-radius:1px;margin:2px 0}

/* Comparison grid */
.compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:10px}
.compare-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;background:var(--surface);position:relative}
.compare-card.selected{border-color:var(--text);border-width:1.5px}
.compare-badge{position:absolute;top:-8px;left:12px;font-size:10px;background:var(--text);color:#fff;padding:2px 8px;border-radius:10px}

/* Ref tag in sidebar */
.ref-tag{font-size:10px;padding:1px 5px;background:var(--surface2);border-radius:4px;color:var(--text3)}

/* Map */
#trip-map{height:340px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;z-index:1}
.seg-map{height:200px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;z-index:1;margin-bottom:16px}
.leaflet-container{font-family:var(--font)}
.map-popup{font-size:13px;font-family:var(--font)}
.map-popup strong{display:block;margin-bottom:2px}

/* Place search autocomplete */
.place-search-wrap{position:relative}
.place-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);z-index:9999;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.place-suggestion{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border)}
.place-suggestion:last-child{border-bottom:none}
.place-suggestion:hover{background:var(--surface2)}
.place-suggestion .ps-main{font-weight:500}
.place-suggestion .ps-sub{font-size:11px;color:var(--text3);margin-top:1px}
/* ── Wizard styles ── */
.wiz-progress{display:flex;gap:4px;margin-bottom:28px}
.wiz-step-dot{height:3px;border-radius:2px;flex:1;background:var(--border);transition:background .2s}
.wiz-step-dot.done{background:var(--amber)}
.wiz-step-dot.active{background:var(--text)}
.wiz-header{margin-bottom:24px}
.wiz-step-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.wiz-title{font-size:22px;font-weight:300;letter-spacing:-.5px;color:var(--text);line-height:1.3}
.wiz-sub{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.5}
.wiz-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;user-select:none}
.wiz-card:hover{border-color:var(--text3)}
.wiz-card.selected{border-color:var(--text);background:var(--surface)}
.wiz-card.selected::after{content:'✓';position:absolute;top:12px;right:14px;font-size:13px;font-weight:600;color:var(--text)}
.wiz-card-title{font-weight:500;font-size:14px;margin-bottom:3px}
.wiz-card-sub{font-size:12px;color:var(--text3);line-height:1.5}
.wiz-chip-group{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.wiz-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:var(--font);font-size:13px;cursor:pointer;transition:all .12s;user-select:none}
.wiz-chip.selected{background:var(--surface);border-color:var(--text);font-weight:500}
.wiz-chip.selected::before{content:'✓ ';}
.wiz-section{margin-bottom:22px}
.wiz-section-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px}
.wiz-concept{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}
.wiz-concept:hover{border-color:var(--text3);transform:translateY(-1px)}
.wiz-concept.selected{border-color:var(--amber);background:var(--amber-bg)}
.wiz-concept-title{font-weight:500;font-size:15px;margin-bottom:6px}
.wiz-concept-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:8px}
.wiz-concept-tags{display:flex;flex-wrap:wrap;gap:5px}
.wiz-concept-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--text3);font-weight:500}
.wiz-seg-preview{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.wiz-seg-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.wiz-seg-row:last-child{border-bottom:none}

<script>

function getSharedCSS(){ return `
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
/* ─── Reset ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ─── Tokens ─── */
:root{
  --ink:#1a1916;--ink2:#4a4845;--ink3:#8a8680;
  --paper:#fffef9;--paper2:#f5f4ef;--paper3:#eceae3;
  --border:#dedad2;--border2:#ccc9c0;
  --amber:#b87d0a;--amber-bg:#fdf6e3;--amber-border:#e8c97a;
  --green:#2d6a38;--green-bg:#edf7ef;
  --blue:#1a4fa0;--blue-bg:#eef3fd;
  --red:#a02020;
  --font:'DM Sans',sans-serif;
  --serif:'DM Serif Display',Georgia,serif;
  --mono:'DM Mono',monospace;
  --page-w:700px;
}
/* ─── Base ─── */
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);color:var(--ink);background:var(--paper);line-height:1.6;padding:32px 20px;max-width:var(--page-w);margin:0 auto}
h1{font-family:var(--serif);font-size:2rem;font-weight:400;letter-spacing:-.5px;line-height:1.2;margin-bottom:.25rem}
h2{font-family:var(--serif);font-size:1.25rem;font-weight:400;margin-bottom:.5rem}
h3{font-size:.875rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase;color:var(--ink3);margin-bottom:.5rem}
p{margin-bottom:.75rem}
a{color:var(--blue);text-decoration:none}
/* ─── Cover ─── */
.cover{padding:40px 0 32px;border-bottom:2px solid var(--ink);margin-bottom:32px}
.cover-meta{font-size:.85rem;color:var(--ink3);margin-top:.5rem;display:flex;gap:16px;flex-wrap:wrap}
.cover-meta span::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--ink3);margin-right:8px;vertical-align:middle}
.cover-meta span:first-child::before{display:none}
/* ─── Budget summary ─── */
.budget-strip{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:32px}
.budget-cell{flex:1;padding:14px 18px;background:var(--paper2)}
.budget-cell+.budget-cell{border-left:1px solid var(--border)}
.budget-num{font-family:var(--serif);font-size:1.5rem;line-height:1}
.budget-lbl{font-size:.75rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
/* ─── Segments ─── */
.seg{margin-bottom:48px;page-break-inside:avoid}
.seg-header{display:flex;align-items:baseline;gap:16px;padding-bottom:12px;border-bottom:2px solid var(--ink);margin-bottom:20px;flex-wrap:wrap}
.seg-city{font-family:var(--serif);font-size:1.6rem;font-weight:400}
.seg-dates{font-size:.85rem;color:var(--ink3)}
.seg-nights{font-size:.85rem;color:var(--ink3)}
/* ─── Info boxes ─── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-box{background:var(--paper2);border:1px solid var(--border);border-radius:6px;padding:12px 14px}
.info-box.amber{background:var(--amber-bg);border-color:var(--amber-border)}
.info-box-label{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:6px}
.info-box-body{font-size:.825rem;color:var(--ink2);line-height:1.55;white-space:pre-line}
/* ─── Option rows ─── */
.opt-row{border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:10px;background:var(--paper)}
.opt-name{font-weight:500;font-size:.925rem;margin-bottom:4px}
.opt-meta{font-size:.8rem;color:var(--ink3);display:flex;gap:10px;flex-wrap:wrap}
.opt-ref{font-family:var(--mono);font-size:.8rem;background:var(--paper2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;display:inline-block;margin-top:6px;color:var(--ink2)}
/* ─── Status pill ─── */
.status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:500;letter-spacing:.02em}
.s-planning{background:var(--paper3);color:var(--ink3)}
.s-confirmed{background:var(--amber-bg);color:var(--amber)}
.s-booked{background:var(--green-bg);color:var(--green)}
/* ─── Days (compact, used in full itinerary) ─── */
.day-compact{padding:8px 0;border-bottom:1px solid var(--paper3);display:flex;gap:12px;align-items:flex-start}
.day-compact:last-child{border-bottom:none}
.day-compact-num{font-size:.75rem;font-weight:500;color:var(--ink3);min-width:36px;padding-top:2px}
.day-compact-date{font-size:.8rem;color:var(--ink3);min-width:80px;padding-top:2px}
.day-compact-body{flex:1}
.day-compact-notes{font-size:.85rem;color:var(--ink2);white-space:pre-wrap;line-height:1.5}
.day-compact-places{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
/* ─── Places grid ─── */
.places-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-top:8px}
.place-card{border:1px solid var(--border);border-radius:6px;padding:10px 12px;background:var(--paper2)}
.place-card-type{font-size:.7rem;color:var(--ink3);margin-bottom:3px}
.place-card-name{font-weight:500;font-size:.85rem;margin-bottom:3px}
.place-card-detail{font-size:.75rem;color:var(--ink3);line-height:1.4}
/* ─── Pill ─── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:.75rem;background:var(--blue-bg);color:var(--blue);border:1px solid #b8d0f8;white-space:nowrap}
/* ─── Notes / reflection ─── */
.notes-body{font-size:.875rem;color:var(--ink2);line-height:1.65;white-space:pre-wrap}
.reflection-box{background:var(--green-bg);border:1px solid #b8d8bf;border-radius:6px;padding:14px 16px;font-size:.875rem;color:var(--ink2);line-height:1.65;white-space:pre-wrap}
/* ─── Culture guide ─── */
.culture-box{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:8px;padding:16px 20px;margin-bottom:32px;font-size:.85rem;color:var(--ink2);line-height:1.7;white-space:pre-line}
/* ─── Section spacing ─── */
.section{margin-bottom:20px}
.section-label{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:8px}
/* ─── Table (budget) ─── */
table{width:100%;border-collapse:collapse;font-size:.825rem}
thead tr{border-bottom:2px solid var(--ink)}
th{text-align:left;padding:6px 8px;font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3)}
td{padding:7px 8px;border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
.td-right{text-align:right}
.td-total td{font-weight:500;border-top:2px solid var(--ink);border-bottom:none;padding-top:10px}
/* ─── Packing ─── */
.pack-cat{margin-bottom:14px}
.pack-cat-label{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);margin-bottom:6px}
.pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px 16px}
.pack-item{font-size:.825rem;color:var(--ink2);padding:2px 0;display:flex;align-items:center;gap:6px}
.pack-item.done{color:var(--ink3);text-decoration:line-through}
.pack-check{width:12px;height:12px;border:1.5px solid var(--border2);border-radius:2px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.pack-check.checked{background:var(--ink);border-color:var(--ink);color:white}
/* ─── Segment colour strip ─── */
.seg-strip{height:4px;border-radius:2px;margin-bottom:20px}
.sc0{background:#b87d0a}.sc1{background:#1a5fa8}.sc2{background:#2d7a3a}.sc3{background:#b52b2b}
.sc4{background:#7b4f9e}.sc5{background:#c47a00}.sc6{background:#0f6e6e}.sc7{background:#c44080}
/* ─── Print ─── */
@media print{
  body{padding:0;background:white}
  .seg{page-break-inside:avoid}
  .no-print{display:none}
  @page{margin:2cm;size:A4}
}
/* ─── Mobile ─── */
@media(max-width:600px){
  body{padding:16px 14px}
  .info-grid{grid-template-columns:1fr}
  .budget-strip{flex-direction:column}
  .budget-cell+.budget-cell{border-left:none;border-top:1px solid var(--border)}
  h1{font-size:1.6rem}
  .seg-city{font-size:1.3rem}
}
<\/style>`; }

// ============================================================
// SIDEBAR TOGGLE (MOBILE)
// ============================================================
function toggleSidebar(){
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.contains('open');
  if(isOpen){ closeSidebar(); } else { openSidebar(); }
}
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function checkMobile(){
  const isMobile = window.innerWidth <= 680;
  const mobileActions = document.getElementById('mobile-actions');
  if(mobileActions) mobileActions.style.display = isMobile ? 'block' : 'none';
}
window.addEventListener('resize', checkMobile);

// STATE
// ============================================================
let state = {
  trip: null
};

const TRAVEL_MODES = ['flight','train','bus','ferry','car','other'];
const PLACE_TYPES = ['eat','do','see','hike','other'];
const CURRENCIES = ['AUD','USD','GBP','EUR','JPY','CNY','NZD','CAD','SGD','THB','KRW','INR','CHF','HKD','TWD','MYR','IDR','VND','PHP','BRL','MXN','ZAR','SEK','NOK','DKK'];
const STATUS_OPTIONS = ['planning','confirmed','booked'];

function emptyTrip(name, startDate, endDate, homeCurrency, localCurrency){
  return {
    id: Date.now(),
    name, startDate, endDate,
    homeCurrency: homeCurrency || 'AUD',
    exchangeRates: {},
    segments: [],
    checklist: [],
    packingList: [],
    notes: '',
    reflection: '',
    cultureGuide: null,
    createdAt: new Date().toISOString()
  };
}

function emptySegment(name, city, startDate, endDate, color){
  return {
    id: Date.now() + Math.random(),
    name, city, startDate, endDate, color: color || 0,
    accommodation: { options: [], selectedIndex: 0 },
    travel: { options: [], selectedIndex: 0 },
    departure: { options: [], selectedIndex: 0 },
    days: [],
    places: [],
    dailyBudget: '',
    weatherSummary: null,
    thingsToKnow: null,
    notes: '',
    reflection: '',
    discoveryShown: []
  };
}

function isLastSegment(segId){
  const t = state.trip;
  if(!t || !t.segments.length) return false;
  return t.segments[t.segments.length - 1].id == segId;
}

function emptyOption(type){
  return {
    id: Date.now() + Math.random(),
    name: '',
    url: '',
    notes: '',
    price: '',
    currency: '',
    pricePerNight: false,
    status: 'planning',
    bookingRef: '',
    extractedData: null,
    type: type || 'accommodation'
  };
}

  return {
    id: Date.now() + Math.random(),
    name: '',
    type: 'eat',
    notes: '',
    url: '',
    price: '',
    currency: '',

function typeSpecificFieldsHTML(place){
  const type = place ? place.type : 'eat';
  const v = (id, fallback='') => place ? (place[id]||fallback) : fallback;
  const sel = (id, opts, val) => opts.map(o => `<option value="${o}"${val===o?' selected':''}>${o||'—'}</option>`).join('');

  const eat = `
    <div id="type-fields-eat" class="type-fields" style="display:${type==='eat'?'block':'none'}">
      <div class="form-group">
        <div class="form-row">
          <label class="form-label">Cuisine</label>
          <input type="text" id="m-pl-cuisine" placeholder="e.g. Japanese, Italian" value="${v('cuisine')}">
        </div>
        <div class="form-row">
          <label class="form-label">Price range</label>
          <select id="m-pl-priceRange">
            <option value="">—</option>
            ${sel('priceRange',['$','$$','$$$','$$$$'], v('priceRange'))}
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Reservation</label>
        <select id="m-pl-reservationRequired">
          <option value="">Unknown</option>
          <option value="yes"${v('reservationRequired')==='yes'?' selected':''}>Required</option>
          <option value="recommended"${v('reservationRequired')==='recommended'?' selected':''}>Recommended</option>
          <option value="no"${v('reservationRequired')==='no'?' selected':''}>Walk-in fine</option>
        </select>
      </div>
    </div>`;

  const see = `
    <div id="type-fields-see" class="type-fields" style="display:${type==='see'?'block':'none'}">
      <div class="form-group">
        <div class="form-row">
          <label class="form-label">Category</label>
          <input type="text" id="m-pl-category" placeholder="e.g. Temple, Museum, Landmark" value="${v('category')}">
        </div>
        <div class="form-row">
          <label class="form-label">Opening hours</label>
          <input type="text" id="m-pl-hours" placeholder="e.g. 9am–5pm" value="${v('hours')}">
        </div>
      </div>
    </div>`;

  const doFields = `
    <div id="type-fields-do" class="type-fields" style="display:${type==='do'?'block':'none'}">
      <div class="form-group">
        <div class="form-row">
          <label class="form-label">Category</label>
          <input type="text" id="m-pl-doCategory" placeholder="e.g. Tour, Class, Sport" value="${v('doCategory')}">
        </div>
        <div class="form-row">
          <label class="form-label">Duration</label>

          </select>

          <label class="form-label">Elevation gain</label>

}

function buildDays(seg){
  if(!seg.startDate || !seg.endDate) return [];
  const days = [];
  let d = new Date(seg.startDate);
  const end = new Date(seg.endDate);
  let i = 1;
  while(d <= end){
    const existing = seg.days.find(x => x.date === d.toISOString().split('T')[0]);
    days.push(existing || { id: Date.now()+Math.random(), date: d.toISOString().split('T')[0], notes: '', placedItems: [] });
    d = new Date(d); d.setDate(d.getDate()+1); i++;
  }
  return days;
}

const TRIPS_KEY = 'tripcraft_trips';
const ACTIVE_KEY = 'tripcraft_active_id';

function getAllTrips(){
  try{ return JSON.parse(localStorage.getItem(TRIPS_KEY)) || []; }
  catch(e){ return []; }
}

function saveAllTrips(trips){
  localStorage.setItem(TRIPS_KEY, JSON.stringify(trips));
}

function persist(){
  if(!state.trip) return;
  const trips = getAllTrips();
  const idx = trips.findIndex(t => t.id === state.trip.id);
  const tripData = { ...state.trip, _lastModified: Date.now() };
  if(idx >= 0) trips[idx] = tripData;
  else trips.push(tripData);
  saveAllTrips(trips);
  localStorage.setItem(ACTIVE_KEY, state.trip.id);
}

function switchToTrip(tripId){
  const trips = getAllTrips();
  const trip = trips.find(t => t.id === tripId);
  if(!trip) return;
  state.trip = trip;
  localStorage.setItem(ACTIVE_KEY, tripId);
  renderAll();
  showView('overview');
  closeTripPicker();
  if(window.innerWidth <= 680) closeSidebar();
}

function deleteTripById(tripId){
  let trips = getAllTrips();
  trips = trips.filter(t => t.id !== tripId);
  saveAllTrips(trips);
  // If we deleted the active trip, load the next one or clear
  if(state.trip && state.trip.id === tripId){
    state.trip = trips.length > 0 ? trips[0] : null;
    if(state.trip) localStorage.setItem(ACTIVE_KEY, state.trip.id);
    else localStorage.removeItem(ACTIVE_KEY);
    renderAll();
    showView('overview');
  }
  renderTripPicker();
}

window.addEventListener('DOMContentLoaded', () => {
  checkMobile();

  // Migration: move old single-trip format into multi-trip storage
  const oldState = localStorage.getItem('tripcraft_state');
  if(oldState){
    try{
      const parsed = JSON.parse(oldState);
      if(parsed.trip && parsed.trip.id){
        const trips = getAllTrips();
        const exists = trips.some(t => t.id === parsed.trip.id);
        if(!exists){
          parsed.trip._lastModified = Date.now();
          trips.push(parsed.trip);
          saveAllTrips(trips);
          localStorage.setItem(ACTIVE_KEY, parsed.trip.id);
        }
      }
    } catch(e){}
    localStorage.removeItem('tripcraft_state');
  }

  // Load active trip
  const activeId = localStorage.getItem(ACTIVE_KEY);
  const trips = getAllTrips();
  if(activeId && trips.length > 0){
    const active = trips.find(t => t.id == activeId) || trips[0];
    state.trip = active || null;
    if(state.trip) localStorage.setItem(ACTIVE_KEY, state.trip.id);
  } else if(trips.length > 0){
    state.trip = trips[0];
    localStorage.setItem(ACTIVE_KEY, trips[0].id);
  }

  renderAll();
});

function renderBudgetBar(){
  const t = state.trip;
  if(!t){ return; }
  const { total, booked, missingRates } = calcBudget();
  const fmt = (n) => n ? n.toLocaleString(undefined,{maximumFractionDigits:0}) : '0';
  const suffix = missingRates.length ? ' *' : '';
  document.getElementById('budget-total-display').textContent = `${t.homeCurrency} ${fmt(total)}${suffix}`;
  document.getElementById('budget-booked-display').textContent = missingRates.length
    ? `* Missing rates: ${missingRates.join(', ')}`
    : `${t.homeCurrency} ${fmt(booked)} booked`;
  const pct = total > 0 ? Math.min(100, Math.round(booked/total*100)) : 0;
  document.getElementById('budget-fill').style.width = pct + '%';
}

function calcBudget(){
  const t = state.trip;
  if(!t) return {total:0, booked:0, missingRates:[]};
  let total = 0, booked = 0;
  const missingRates = new Set();
  const convert = (price, currency) => {
    if(!price || isNaN(parseFloat(price))) return 0;
    const p = parseFloat(price);
    if(!currency || currency === t.homeCurrency) return p;
    const rate = (t.exchangeRates || {})[currency];
    if(!rate){
      missingRates.add(currency);
      return 0; // exclude from total rather than show wrong number
    }
    return p * rate;
  };

  (t.segments || []).forEach(seg => {
    // Departure (last segment only)
    if(seg.departure && seg.departure.options && seg.departure.options.length){
      const opt = seg.departure.options[seg.departure.selectedIndex||0];
      if(opt && opt.price){
        const p = convert(opt.price, opt.currency || t.homeCurrency);
        total += p;
        if(opt.status === 'booked') booked += p;
      }
    }
    // Accommodation
    const acc = seg.accommodation;
    if(acc && acc.options && acc.options[acc.selectedIndex]){
      const opt = acc.options[acc.selectedIndex];
      let nights = 0;
      if(seg.startDate && seg.endDate){
        nights = calcNights(seg.startDate, seg.endDate);
      }
      const p = convert(opt.price, opt.currency || t.homeCurrency) * (opt.pricePerNight ? nights : 1);
      total += p;
      if(opt.status === 'booked') booked += p;
    }
    // Travel
    const trav = seg.travel;
    if(trav && trav.options && trav.options[trav.selectedIndex]){
      const opt = trav.options[trav.selectedIndex];
      const p = convert(opt.price, opt.currency || t.homeCurrency);
      total += p;
      if(opt.status === 'booked') booked += p;
    }
    // Places
    (seg.places || []).forEach(place => {
      const p = convert(place.price, place.currency || t.homeCurrency);
      total += p;
      if(place.status === 'booked') booked += p;
    });
    // Daily incidentals
    if(seg.dailyBudget && !isNaN(parseFloat(seg.dailyBudget))){
      const nights = calcNights(seg.startDate, seg.endDate) || (seg.days ? seg.days.length : 0);
      total += parseFloat(seg.dailyBudget) * nights;
    }
  });
  return {total, booked, missingRates: [...missingRates]};
}

function renderRatesTable(){
  const t = state.trip;
  if(!t) return '';
  const currencies = [...new Set([
    t.homeCurrency,
    ...t.segments.flatMap(s => [
      ...(s.accommodation.options||[]).map(o=>o.currency),
      ...(s.travel.options||[]).map(o=>o.currency),
      ...(s.places||[]).map(p=>p.currency)
    ].filter(Boolean))
  ])].filter(c => c && c !== t.homeCurrency);

  if(currencies.length === 0) return '<div style="font-size:13px;color:var(--text3)">No foreign currencies used yet.</div>';
  return currencies.map(c => {
    const rate = (t.exchangeRates||{})[c];
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:13px;min-width:60px;font-weight:500">${c}</span>
      <input type="number" step="any" placeholder="Rate to ${t.homeCurrency}" 
        value="${rate||''}" 
        style="width:160px" 
        onchange="setRate('${c}',this.value)"
        title="1 ${c} = ? ${t.homeCurrency}">
      <span style="font-size:12px;color:var(--text3)">1 ${c} = ? ${t.homeCurrency}</span>
    </div>`;
  }).join('');
}

function setRate(currency, val){
  if(!state.trip) return;
  if(!state.trip.exchangeRates) state.trip.exchangeRates = {};
  state.trip.exchangeRates[currency] = parseFloat(val) || 0;
  persist();
  renderBudgetBar();
}

async function fetchRates(){
  const t = state.trip;
  if(!t) return;

  const usedCurrencies = [...new Set(
    t.segments.flatMap(s => [
      ...(s.accommodation.options||[]).map(o=>o.currency),
      ...(s.travel.options||[]).map(o=>o.currency),
      ...(s.departure ? s.departure.options||[] : []).map(o=>o.currency),
      ...(s.places||[]).map(p=>p.currency)
    ].filter(c => c && c !== t.homeCurrency))
  )];

  if(!usedCurrencies.length){ toast('No foreign currencies used yet'); return; }
  toast('Fetching exchange rates…');
  try{
    // frankfurter.app — completely free, no key, open source
    const symbols = usedCurrencies.join(',');
    const resp = await fetch(`https://api.frankfurter.app/latest?from=${t.homeCurrency}&to=${symbols}`);
    if(!resp.ok) throw new Error('API error');
    const data = await resp.json();
    if(!t.exchangeRates) t.exchangeRates = {};
    // data.rates gives "1 home = X foreign", we want "1 foreign = X home"
    Object.entries(data.rates).forEach(([c, r]) => {
      if(r > 0) t.exchangeRates[c] = parseFloat((1/r).toFixed(6));
    });
    persist();
    renderOverview();
    renderBudgetBar();
    toast('Rates updated ✓');
  } catch(e){
    toast('Could not fetch rates — check your connection, or enter manually.');
  }
}

function renderBudgetView(){
  const t = state.trip;
  const el = document.getElementById('view-budget');
  if(!t){ el.innerHTML = '<div class="empty"><div class="empty-text">No trip loaded</div></div>'; return; }

  const {total, booked} = calcBudget();
  const fmt = n => n ? n.toLocaleString(undefined,{maximumFractionDigits:0}) : '0';
  const convert = (price, currency) => {
    if(!price || isNaN(parseFloat(price))) return 0;
    const p = parseFloat(price);
    if(!currency || currency === t.homeCurrency) return p;
    const rate = (t.exchangeRates || {})[currency];
    if(!rate) return 0; // exclude rather than show wrong number
    return p * rate;
  };

  let rows = [];
  (t.segments || []).forEach(seg => {
    let nights = 0;
    if(seg.startDate && seg.endDate) nights = calcNights(seg.startDate,seg.endDate);
    // Travel
    if(seg.travel.options.length > 0){
      const opt = seg.travel.options[seg.travel.selectedIndex] || seg.travel.options[0];
      if(opt.price){
        const p = convert(opt.price, opt.currency||t.homeCurrency);
        rows.push({ segment: seg.city||seg.name, category:'Travel', name:opt.name||'Travel', price:p, status:opt.status, orig:opt.price, origCurr:opt.currency||t.homeCurrency });
      }
    }
    // Departure
    if(seg.departure && seg.departure.options && seg.departure.options.length > 0){
      const opt = seg.departure.options[seg.departure.selectedIndex||0] || seg.departure.options[0];
      if(opt && opt.price){
        const p = convert(opt.price, opt.currency||t.homeCurrency);
        rows.push({ segment: seg.city||seg.name, category:'Departure', name:opt.name||'Departure', price:p, status:opt.status, orig:opt.price, origCurr:opt.currency||t.homeCurrency });
      }
    }
    // Accommodation
    if(seg.accommodation.options.length > 0){
      const opt = seg.accommodation.options[seg.accommodation.selectedIndex] || seg.accommodation.options[0];
      if(opt.price){
        const p = convert(opt.price, opt.currency||t.homeCurrency) * (opt.pricePerNight ? nights : 1);
        rows.push({ segment: seg.city||seg.name, category:'Accommodation', name:opt.name||'Accommodation', price:p, status:opt.status, orig:opt.price, origCurr:opt.currency||t.homeCurrency, nights: opt.pricePerNight ? nights : null });
      }
    }
    // Places
    (seg.places||[]).forEach(place => {
      if(place.price){
        const p = convert(place.price, place.currency||t.homeCurrency);
        rows.push({ segment: seg.city||seg.name, category:'Activities', name:place.name, price:p, status:place.status, orig:place.price, origCurr:place.currency||t.homeCurrency });
      }
    });
    // Daily budget
    if(seg.dailyBudget && !isNaN(parseFloat(seg.dailyBudget))){
      const nights = calcNights(seg.startDate, seg.endDate) || (seg.days ? seg.days.length : 0);
      const p = parseFloat(seg.dailyBudget) * nights;
      rows.push({ segment: seg.city||seg.name, category:'Daily spend', name:`${t.homeCurrency} ${seg.dailyBudget}/day × ${nights} nights`, price:p, status:'planning', orig:seg.dailyBudget+'/day', origCurr:t.homeCurrency });
    }
  });

  el.innerHTML = `
    <div class="section-title">Budget breakdown</div>
    <div class="section-sub">All amounts converted to ${t.homeCurrency}</div>

    <div class="two-col" style="margin-bottom:24px">
      <div class="welcome-stat"><div class="welcome-stat-num">${t.homeCurrency} ${fmt(total)}</div><div class="welcome-stat-label">projected total</div></div>
      <div class="welcome-stat"><div class="welcome-stat-num">${t.homeCurrency} ${fmt(booked)}</div><div class="welcome-stat-label">confirmed booked</div></div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Line items</div></div>
      ${rows.length === 0 ? '<div class="empty"><div class="empty-text">Add costs to your segments to see them here</div></div>' : ''}
      ${rows.length > 0 ? `
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:6px 8px;color:var(--text3);font-weight:400">Segment</th>
            <th style="text-align:left;padding:6px 8px;color:var(--text3);font-weight:400">Category</th>
            <th style="text-align:left;padding:6px 8px;color:var(--text3);font-weight:400">Item</th>
            <th style="text-align:right;padding:6px 8px;color:var(--text3);font-weight:400">Original</th>
            <th style="text-align:right;padding:6px 8px;color:var(--text3);font-weight:400">${t.homeCurrency}</th>
            <th style="text-align:center;padding:6px 8px;color:var(--text3);font-weight:400">Status</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:8px 8px;color:var(--text2)">${esc(r.segment)}</td>
              <td style="padding:8px 8px;color:var(--text2)">${r.category}</td>
              <td style="padding:8px 8px">${esc(r.name)}${r.nights ? `<span style="font-size:11px;color:var(--text3)"> × ${r.nights}n</span>` : ''}</td>
              <td style="padding:8px 8px;text-align:right;color:var(--text2)">${r.origCurr} ${r.orig}</td>
              <td style="padding:8px 8px;text-align:right;font-weight:500">${fmt(r.price)}</td>
              <td style="padding:8px 8px;text-align:center"><span class="status status-${r.status}">${r.status}</span></td>
            </tr>`).join('')}
            <tr style="border-top:2px solid var(--border)">
              <td colspan="4" style="padding:10px 8px;font-weight:500">Total</td>
              <td style="padding:10px 8px;text-align:right;font-weight:500;font-size:16px">${fmt(total)}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      ` : ''}
    </div>
  `;
}

function renderSegment(segId){
  const t = state.trip;
  const el = document.getElementById('view-segment');
  if(!t){ el.innerHTML = ''; return; }
  const seg = t.segments.find(s => s.id == segId);
  if(!seg){ el.innerHTML = ''; return; }

  // Rebuild days if needed
  if(seg.startDate && seg.endDate){
    seg.days = buildDays(seg);
  }
  persist();

  const prevSegId = el.getAttribute('data-seg');
  el.setAttribute('data-seg', segId);
  // Only reset tab when switching to a different segment
  if(prevSegId !== String(segId)) _activeSegTab = 'tab-travel';

  el.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">
      <div>
        <div class="section-title">${esc(seg.city||seg.name)}</div>
        <div class="section-sub">${seg.startDate ? fmtDate(seg.startDate) : ''} ${seg.endDate ? '→ '+fmtDate(seg.endDate) : ''} ${seg.startDate && seg.endDate ? '· '+calcNights(seg.startDate,seg.endDate)+' nights' : seg.days && seg.days.length ? '· '+(seg.days.length-1)+' nights' : ''}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="editSegment('${seg.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSegment('${seg.id}')">Delete</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchSegTab(this,'tab-travel')">Travel in</button>
      <button class="tab" onclick="switchSegTab(this,'tab-accommodation')">Accommodation</button>
      <button class="tab" onclick="switchSegTab(this,'tab-days')">Day plans</button>
      <button class="tab" onclick="switchSegTab(this,'tab-places')">Places list</button>
      ${isLastSegment(seg.id) ? '<button class="tab" onclick="switchSegTab(this,&quot;tab-departure&quot;)">Travel out</button>' : ''}
      <button class="tab" onclick="switchSegTab(this,'tab-info')">Info</button>
    </div>

    <div id="tab-travel">${renderTravelTab(seg)}</div>
    <div id="tab-accommodation" style="display:none">${renderAccomTab(seg)}</div>
    <div id="tab-days" style="display:none">${renderDaysTab(seg)}</div>
    <div id="tab-places" style="display:none">${renderPlacesTab(seg)}</div>
    ${isLastSegment(seg.id) ? '<div id="tab-departure" style="display:none">' + renderDepartureTab(seg) + '</div>' : ''}
    <div id="tab-info" style="display:none">${renderInfoTab(seg)}</div>
  `;

  initDragDrop(seg);

  // Insert mini-map div before tabs and render it
  const mapDiv = document.createElement('div');
  mapDiv.id = 'seg-map-' + seg.id;
  mapDiv.className = 'seg-map';
  const tabsEl = el.querySelector('.tabs');
  if(tabsEl) el.insertBefore(mapDiv, tabsEl);
  buildSegMiniMap(seg);
}

let _activeSegTab = 'tab-travel';

function switchSegTab(btn, tabId){
  btn.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const segEl = document.getElementById('view-segment');
  segEl.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
  _activeSegTab = tabId;
}

function restoreSegTab(){
  const tabEl = document.getElementById(_activeSegTab);
  if(!tabEl) return;
  tabEl.style.display = 'block';
  // Find and activate the matching tab button
  const segEl = document.getElementById('view-segment');
  segEl.querySelectorAll('.tab').forEach(btn => {
    const match = btn.getAttribute('onclick') && (
      btn.getAttribute('onclick').includes("'" + _activeSegTab + "'") ||
      btn.getAttribute('onclick').includes('"' + _activeSegTab + '"')
    );
    btn.classList.toggle('active', !!match);
  });
}

function renderOptionCard(opt, idx, selIdx, type, seg){
  const isPrimary = idx === selIdx;
  const t = state.trip;
  const nights = seg.startDate && seg.endDate ? calcNights(seg.startDate,seg.endDate) : null;
  const priceLine = opt.price ? `${opt.currency||t.homeCurrency} ${opt.price}${opt.pricePerNight && nights ? ` /night (${(opt.price*nights).toFixed(0)} total)` : ''}` : '';

  return `<div class="option-card ${isPrimary ? 'primary' : 'alternate'}" id="optcard-${opt.id}">
    ${!isPrimary ? `<div style="position:absolute;top:8px;right:8px"><button class="btn btn-ghost btn-sm" onclick="selectOption('${seg.id}','${type}',${idx})">Select as primary</button></div>` : ''}
    ${isPrimary ? '<div style="position:absolute;top:8px;right:8px;font-size:11px;color:var(--text3);font-weight:500">PRIMARY</div>' : ''}
    <div class="option-name">${opt.name || `Option ${idx+1}`}</div>
    <div class="option-meta">
      ${(type==='travel'||type==='departure') && opt.fromName ? `<span>${esc(opt.fromName)}</span><span>→</span>` : ''}
      ${(type==='travel'||type==='departure') && opt.toName ? `<span>${esc(opt.toName)}</span>` : ''}
      ${(type==='travel'||type==='departure') && opt.mode ? `<span style="margin-left:2px">(${opt.mode})</span>` : ''}
      ${(type==='travel'||type==='departure') && opt.departureTime ? `<span>Departs ${opt.departureTime}</span>` : ''}
      ${(type==='travel'||type==='departure') && opt.arrivalTime ? `<span>Arrives ${opt.arrivalTime}</span>` : ''}
      ${(type==='travel'||type==='departure') && opt.duration ? `<span>${opt.duration}</span>` : ''}
      ${type==='accommodation' && opt.checkIn ? `<span>Check-in ${opt.checkIn}</span>` : ''}
      ${type==='accommodation' && opt.checkOut ? `<span>Check-out ${opt.checkOut}</span>` : ''}
    </div>
    ${opt.price ? `<div class="option-price">${priceLine}</div>` : ''}
    ${opt.notes ? `<div style="font-size:12px;color:var(--text2);margin-top:6px">${esc(opt.notes)}</div>` : ''}
    <div class="option-actions" style="margin-top:10px">
      <span class="status status-${opt.status}">${opt.status}</span>
      ${opt.bookingRef ? `<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">Ref: ${esc(opt.bookingRef)}</span>` : ''}
      ${opt.url ? `<a href="${esc(opt.url)}" target="_blank" class="btn btn-ghost btn-sm">View link ↗</a>` : ''}
      ${(type==='travel'||type==='departure') && !opt.price ? `<button class="btn btn-amber btn-sm" onclick="estimateTravelCost('${seg.id}','${type}','${opt.id}')">~ Estimate cost</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="showOptionModal('${type}','${seg.id}','${opt.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteOption('${seg.id}','${type}','${opt.id}')">Remove</button>
    </div>
  </div>`;
}

function renderDayRow(day, i, seg){
  const placedItems = (day.placedItems||[]).map((pid, idx, arr) => {

    return `<span class="placed-item" data-pid="${place.id}" style="display:inline-flex;align-items:center;gap:4px">
      <span style="display:flex;flex-direction:column;gap:0;margin-right:2px">

  const dateStr = day.date ? fmtDate(day.date) : `Day ${i+1}`;

  return `<div class="day-row" data-dayid="${day.id}">

      <span class="day-date">${dow} ${dateStr}</span>

      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Assign places using the <strong>+ Day</strong> button on each place, or drag and drop from the Places list tab</div>
      <div class="day-drop-zone" 
        id="dropzone-${day.id}" 
        ondragover="onDragOver(event,'${day.id}')" 
        ondrop="onDrop(event,'${seg.id}','${day.id}')" 
        ondragleave="onDragLeave(event)">
        ${placedItems || `<span class="drop-hint">No places assigned yet</span>`}

          <div class="form-label" style="margin:0">Day notes</div>

        </div>
        <textarea 
          placeholder="What's the plan for the day? Any thoughts, ideas, or reminders…"
          onchange="updateDayNotes('${seg.id}','${day.id}',this.value)"
          style="min-height:100px">${esc(day.notes||'')}</textarea>
      </div>
    </div>
  </div>`;
}

function toggleDay(header){
  const body = header.nextElementSibling;
  const chev = header.querySelector('.day-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  body.style.display = isOpen ? 'none' : 'block';
}

function updateDayNotes(segId, dayId, val){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  if(!day) return;
  day.notes = val;
  // Update preview in header
  const titleEl = document.getElementById(`day-title-${dayId}`);
  if(titleEl) titleEl.textContent = val ? val.substring(0,50)+(val.length>50?'…':'') : '';
  persist();
}

      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Tap <strong>+ Day</strong> on any place to assign it to one or more days. Or drag and drop onto a day in the Day plans tab. Multiple places can be assigned to the same day.</div>
      ${(seg.places||[]).length === 0 ? '<div class="empty"><div class="empty-text">Add places you might want to visit, eat, or explore</div></div>' : ''}
      <div id="places-list-${seg.id}">
        ${(seg.places||[]).map(p => renderPlaceItem(p, seg)).join('')}
      </div>
    </div>`;
}

function placeTypeDetails(place){
  const t = place.type;
  const parts = [];
  if(t === 'eat'){
    if(place.cuisine) parts.push(place.cuisine);
    if(place.priceRange) parts.push(place.priceRange);
    if(place.reservationRequired && place.reservationRequired !== 'Unknown') parts.push('Reservation: ' + place.reservationRequired);
    if(place.hours) parts.push(place.hours);
  } else if(t === 'see'){
    if(place.category) parts.push(place.category);
    if(place.hours) parts.push(place.hours);
  } else if(t === 'do'){
    if(place.doCategory) parts.push(place.doCategory);
    if(place.duration) parts.push(place.duration);
    if(place.bookingRequired && place.bookingRequired !== 'Unknown') parts.push('Booking: ' + place.bookingRequired);
  } else if(t === 'hike'){
    if(place.distance) parts.push(place.distance);
    if(place.estimatedTime) parts.push(place.estimatedTime);
    if(place.difficulty) parts.push(place.difficulty);
    if(place.elevationGain) parts.push('▲ ' + place.elevationGain);
    if(place.trailType) parts.push(place.trailType);
  }
  return parts.join(' · ');
}

function renderPlaceItem(place, seg){
  const dayAssignments = (place.assignedDays||[]).map(dayId => {
    const day = seg.days.find(d => d.id == dayId);
    if(!day) return '';
    const idx = seg.days.indexOf(day);
    return `<span class="place-day-tag">Day ${idx+1}</span>`;
  }).join(' ');

  const typeDetails = placeTypeDetails(place);

  return `<div class="place-item" 
    draggable="true" 
    data-placeid="${place.id}"
    ondragstart="onPlaceDragStart(event,'${place.id}')"
    ondragend="onPlaceDragEnd(event)">
    <div class="place-type place-type-${place.type}">${placeTypeEmoji(place.type)}</div>
    <div class="place-info">
      <div class="place-name">${esc(place.name)}</div>
      <div class="place-details" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${typeDetails ? `<span style="color:var(--text2)">${esc(typeDetails)}</span>` : `<span style="color:var(--text3)">${place.type}</span>`}
        ${dayAssignments}
      </div>
      ${place.notes ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(place.notes.substring(0,80))}</div>` : ''}
      ${place.price ? `<div class="place-price">${place.currency||state.trip.homeCurrency} ${place.price}</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
      <span class="status status-${place.status}">${place.status}</span>
      <div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:3px 8px" onclick="showAssignDayModal('${seg.id}','${place.id}')" title="Assign to a day">+ Day</button>
        ${place.url ? `<button class="icon-btn" onclick="window.open('${esc(place.url)}','_blank')" title="Open link">↗</button>` : ''}
        <button class="icon-btn" onclick="showPlaceModal('${seg.id}','${place.id}')">✎</button>
        <button class="icon-btn" onclick="deletePlace('${seg.id}','${place.id}')">×</button>
      </div>
    </div>
  </div>`;
}

function placeTypeEmoji(type){
  return {eat:'🍽',do:'🎯',see:'👁',hike:'🥾',other:'📍'}[type]||'📍';
}

function showAssignDayModal(segId, placeId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const place = seg.places.find(p => p.id == placeId);
  if(!place) return;
  if(!seg.days || seg.days.length === 0){
    toast('Add dates to this segment to generate days first');
    return;
  }

  const dayButtons = seg.days.map((day, i) => {
    const isAssigned = (day.placedItems||[]).includes(place.id);
    const dow = day.date ? new Date(day.date + ' 00:00').toLocaleDateString('en',{weekday:'short'}) : '';
    const dateStr = day.date ? fmtDate(day.date) : 'Day ' + (i+1);
    return `<button 
      onclick="toggleDayAssignment('${segId}','${placeId}','${day.id}',this)"
      style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 14px;margin-bottom:6px;border-radius:var(--radius);border:1.5px solid ${isAssigned ? 'var(--amber)' : 'var(--border)'};background:${isAssigned ? 'var(--amber-bg)' : 'var(--surface)'};cursor:pointer;font-family:var(--font);font-size:13px;text-align:left"
      data-assigned="${isAssigned}">
      <span>
        <span style="font-size:11px;color:var(--text3);margin-right:6px">Day ${i+1}</span>
        <span style="color:var(--text2)">${dow} ${dateStr}</span>
      </span>
      <span style="font-size:13px">${isAssigned ? '✓' : '+'}</span>
    </button>`;
  }).join('');

  openModal(`
    <div class="modal-header">
      <h2>Assign to day</h2>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;font-weight:500;margin-bottom:12px">${esc(place.name)}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">Tap a day to assign or unassign. A place can appear on multiple days.</div>
      <div id="day-assign-list">${dayButtons}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal();renderSegment('${segId}');setTimeout(restoreSegTab,10)">Done</button>
    </div>
  `);
}

function toggleDayAssignment(segId, placeId, dayId, btn){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  const place = seg.places.find(p => p.id == placeId);
  if(!day || !place) return;

  if(!day.placedItems) day.placedItems = [];
  if(!place.assignedDays) place.assignedDays = [];

  const isAssigned = day.placedItems.includes(place.id);
  if(isAssigned){
    day.placedItems = day.placedItems.filter(id => id != placeId);
    place.assignedDays = place.assignedDays.filter(id => id != dayId);
    btn.style.border = '1.5px solid var(--border)';
    btn.style.background = 'var(--surface)';
    btn.setAttribute('data-assigned','false');
    btn.querySelector('span:last-child').textContent = '+';
  } else {
    day.placedItems.push(place.id);
    place.assignedDays.push(dayId);
    btn.style.border = '1.5px solid var(--amber)';
    btn.style.background = 'var(--amber-bg)';
    btn.setAttribute('data-assigned','true');
    btn.querySelector('span:last-child').textContent = '✓';
  }
  persist();
}

// ============================================================
// DRAG AND DROP
// ============================================================
let dragPlaceId = null;

function onPlaceDragStart(e, placeId){
  dragPlaceId = placeId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'copy';
}

function onPlaceDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  dragPlaceId = null;
}

function onDragOver(e, dayId){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  document.getElementById(`dropzone-${dayId}`).classList.add('drag-over');
}

function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, segId, dayId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragPlaceId) return;
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  if(!day) return;
  const place = seg.places.find(p => p.id == dragPlaceId);
  if(!place) return;

  if(!day.placedItems) day.placedItems = [];
  if(!place.assignedDays) place.assignedDays = [];

  if(!day.placedItems.includes(place.id)){
    day.placedItems.push(place.id);
  }
  if(!place.assignedDays.includes(day.id)){
    place.assignedDays.push(day.id);
  }

  persist();
  // Re-render just this segment
  renderSegment(segId);
  switchToTabIfNeeded('tab-days');
}

function switchToTabIfNeeded(tabId){
  // keep current tab state
}

function removePlacedItem(segId, dayId, placeId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const day = seg.days.find(d => d.id == dayId);
  const place = seg.places.find(p => p.id == placeId);
  if(day && day.placedItems) day.placedItems = day.placedItems.filter(id => id != placeId);
  if(place && place.assignedDays) place.assignedDays = place.assignedDays.filter(id => id != dayId);
  persist();
  renderSegment(segId);
  // reopen days tab
  setTimeout(() => {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(t => { if(t.onclick && t.onclick.toString().includes('tab-days')) t.click(); });
  }, 50);
}

function selectOption(segId, type, idx){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const poolKey = type === 'travel' ? 'travel' : type === 'departure' ? 'departure' : 'accommodation';
  const pool = seg[poolKey];

  // For accommodation: move selected option to top of list so primary is always first
  if(poolKey === 'accommodation' && idx !== 0 && pool.options[idx]){
    const selected = pool.options.splice(idx, 1)[0];
    pool.options.unshift(selected);
    pool.selectedIndex = 0;
  } else {
    pool.selectedIndex = idx;
  }

  persist();
  renderSegment(segId);
  renderBudgetBar();
  setTimeout(restoreSegTab, 10);
}

function deleteOption(segId, type, optId){
  const seg = state.trip.segments.find(s => s.id == segId);
  if(!seg) return;
  const pool = type === 'travel' ? seg.travel : type === 'departure' ? seg.departure : seg.accommodation;
  pool.options = pool.options.filter(o => o.id != optId);
  if(pool.selectedIndex >= pool.options.length) pool.selectedIndex = 0;
  persist();
  renderSegment(segId);
  renderBudgetBar();
  setTimeout(restoreSegTab, 10);
}

function syncSegEndDate(startVal){
  if(!startVal) return;
  const endEl = document.getElementById('m-seg-end');

  const startD = new Date(startVal + ' 00:00');
  const endD = endEl.value ? new Date(endEl.value + ' 00:00') : null;
  if(!endD || endD <= startD){
    const suggested = new Date(startD);
    suggested.setDate(suggested.getDate() + 7);
    endEl.value = suggested.toISOString().split('T')[0];
  }
}

// ---- Add/Edit Segment Modal ----
function showAddSegmentModal(existingId){
  const t = state.trip;
  if(!t){ toast('Create a trip first'); return; }
  const seg = existingId ? t.segments.find(s => s.id == existingId) : null;

  // Smart date defaults: for a new segment, suggest the day after the last segment ends
  let defaultStart = '', defaultEnd = '';
  if(!seg && t.segments.length > 0){
    const lastSeg = t.segments[t.segments.length - 1];
    if(lastSeg.endDate){
      const d = new Date(lastSeg.endDate + ' 00:00');
      d.setDate(d.getDate() + 1);
      defaultStart = d.toISOString().split('T')[0];
      // Default end to 7 days after suggested start
      const e = new Date(d);
      e.setDate(e.getDate() + 7);
      defaultEnd = e.toISOString().split('T')[0];
    }
  } else if(!seg && t.startDate && t.segments.length === 0){
    defaultStart = t.startDate;
    // Default end to 7 days after trip start
    const e = new Date(t.startDate + ' 00:00');
    e.setDate(e.getDate() + 7);
    defaultEnd = e.toISOString().split('T')[0];
  }

  const hintText = !seg && defaultStart
    ? `<div class="form-hint">Pre-filled — adjust as needed</div>`
    : '';

  openModal(`
    <div class="modal-header">
      <h2>${seg ? 'Edit segment' : 'Add segment'}</h2>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">City / destination</label>
        <input type="text" id="m-seg-city" placeholder="e.g. Tokyo" value="${esc(seg ? seg.city : '')}">
      </div>
      <div class="form-row">
        <label class="form-label">Segment name (optional)</label>
        <input type="text" id="m-seg-name" placeholder="e.g. Tokyo - hiking base" value="${esc(seg ? seg.name : '')}">
      </div>
      <div class="form-group">
        <div class="form-row">
          <label class="form-label">Arrival date</label>
          <input type="date" id="m-seg-start" value="${seg ? seg.startDate : defaultStart}" onchange="syncSegEndDate(this.value)">
          ${hintText}
        </div>
        <div class="form-row">
          <label class="form-label">Departure date</label>
          <input type="date" id="m-seg-end" value="${seg ? seg.endDate : defaultEnd}">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Colour</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          ${[0,1,2,3,4,5,6,7].map(i => `<button type="button" onclick="document.getElementById('m-seg-color').value=${i};document.querySelectorAll('.seg-color-picker').forEach(b=>b.style.outline='none');this.style.outline='2px solid var(--text)'" class="seg-color-picker" style="width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;outline:${(seg?seg.color:colorIdx)===i?'2px solid var(--text)':'none'}" id="seg-color-btn-${i}"><span class="dot seg-color-${i}" style="width:20px;height:20px;border-radius:50%;display:block;margin:2px"></span></button>`).join('')}
          <input type="hidden" id="m-seg-color" value="${seg ? seg.color : colorIdx}">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSegment('${existingId||''}')">Save</button>
    </div>
  `);
}

function editSegment(segId){ showAddSegmentModal(segId); }

function sortSegments(){
  // Sort segments by start date; segments with no date stay in their current relative order at the end
  state.trip.segments.sort((a, b) => {
    if(!a.startDate && !b.startDate) return 0;
    if(!a.startDate) return 1;
    if(!b.startDate) return -1;
    return new Date(a.startDate) - new Date(b.startDate);
  });
}

function moveSegment(segId, direction){
  const segs = state.trip.segments;
  const idx = segs.findIndex(s => s.id == segId);
  const newIdx = idx + direction;
  if(newIdx < 0 || newIdx >= segs.length) return;
  const tmp = segs[idx];
  segs[idx] = segs[newIdx];
  segs[newIdx] = tmp;
  persist();
  renderAll();
  // Restore active segment highlight
  const el = document.getElementById('nav-seg-' + segId);
  if(el) el.classList.add('active');
}

function saveSegment(existingId){
  const city = document.getElementById('m-seg-city').value.trim();
  const name = document.getElementById('m-seg-name').value.trim();
  const start = document.getElementById('m-seg-start').value;
  const end = document.getElementById('m-seg-end').value;
  const colorVal = parseInt(document.getElementById('m-seg-color').value) || 0;

  if(existingId){
    const seg = state.trip.segments.find(s => s.id == existingId);
    if(seg){ seg.city = city; seg.name = name; seg.startDate = start; seg.endDate = end; seg.color = colorVal; }
  } else {
    const newSeg = emptySegment(name||city, city, start, end, colorVal);
    newSeg.color = colorVal;
    state.trip.segments.push(newSeg);
  }
  sortSegments();
  persist();
  closeModal();
  renderAll();
  const seg = existingId ? state.trip.segments.find(s=>s.id==existingId) : state.trip.segments[state.trip.segments.length-1];
  if(seg) showSegment(seg.id);
}

function deleteSegment(segId){
  if(!confirm('Delete this segment?')) return;
  state.trip.segments = state.trip.segments.filter(s => s.id != segId);
  persist();
  renderAll();
  showView('overview');
}
